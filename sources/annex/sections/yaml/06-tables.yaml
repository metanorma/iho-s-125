  - title: "Category Of Installation Buoy"
    definition: "Classification of fixed installation buoy"
    sub_definitions:
      - name: "catenary anchor leg mooring (CALM)"
        definition: "Incorporates a large buoy which remains on the surface at all times and is moored by 4 or more anchors. Mooring hawsers and cargo hoses lead from a turntable on top of the buoy, so that the buoy does not turn as the ship swings to wind and stream."
      - name: "catenary anchor leg mooring (CALM)"
        definition: "A mooring structure used by tankers to load and unload in port approaches or in offshore oil and gas fields. The size of the structure can vary between a large mooring buoy and a manned floating structure. Also known as single point mooring (SPM)"
    remarks: "No remarks."

  - title: "Quality of Horizontal Measurement"
    definition: "The degree of reliability attributed to a position."
    sub_definitions:
      - name: "Surveyed"
        definition: "The position(s) was(were) determined by the operation of making measurements for determining the relative position of points on, above or beneath the earth's surface. Survey implies a regular, controlled survey of any date."
      - name: "Unsurveyed"
        definition: "Survey data does not exist or is very poor."
      - name: "Inadequately Surveyed"
        definition: "Not surveyed to modern standards; or due to its age, scale, or positional or vertical uncertainties is not suitable to the type of navigation expected in the area."
      - name: "Approximate"
        definition: "A position that is considered to be less than third-order accuracy, but is generally considered to be within 30.5 metres of its correct geographic location. Also may apply to an object whose position does not remain fixed."
      - name: "Position Doubtful"
        definition: "Of uncertain position. The expression is used principally on charts to indicate that a wreck, shoal, etc., has been reported in various positions and not definitely determined in any."
      - name: "Unreliable"
        definition: "A feature's position has been obtained from questionable or unreliable data."
      - name: "Reported (Not Surveyed)"
        definition: "An object whose position has been reported and its position confirmed by some means other than a formal survey such as an independent report of the same object."
      - name: "Reported (Not Confirmed)"
        definition: "An object whose position has been reported and its position has not been confirmed."
      - name: "Estimated"
        definition: "The most probable position of an object determined from incomplete data or data of questionable accuracy."
      - name: "Precisely Known"
        definition: "A position that is of a known value, such as the position of an anchor berth or other defined object."
      - name: "Calculated"
        definition: "A position that is computed from data."
    remarks: "No remarks."

