  - title: "Horizontal Datum"
    definition: "Horizontal reference surface or the reference coordinate system used for geodetic control in the calculation of coordinates of points on the earth."
    sub_definitions:
      - name: "WGS 72"
        definition: "A standard for use in cartography, geodesy, and satellite navigation including GPS. This standard includes the definition of the coordinate system's fundamental and derived constants, the ellipsoidal (normal) Earth Gravitational Model (EGM), a description of the associated World Magnetic Model (WMM), and a current list of local datum transformations. The WGS 72 is based on selected satellite, surface gravity and astrogeodetic data available through 1972."
      - name: "WGS 84"
        definition: "A standard for use in cartography, geodesy, and satellite navigation including GPS. This standard includes the definition of the coordinate system's fundamental and derived constants, the ellipsoidal (normal) Earth Gravitational Model (EGM), a description of the associated World Magnetic Model (WMM), and a current list of local datum transformations. WGS 84 is the reference coordinate system used by the Global Positioning System."
      - name: "European 1950"
        definition: "A geodetic datum first defined in 1950 suitable for use in Europe - west: Andorra; Cyprus; Denmark - onshore and offshore; Faroe Islands - onshore; France - offshore; Germany - offshore North Sea; Gibraltar; Greece - offshore; Israel - offshore; Italy including San Marino and Vatican City State; Ireland offshore; Malta; Netherlands - offshore; North Sea; Norway including Svalbard - onshore and offshore; Portugal - mainland - offshore; Spain - onshore; Turkey - onshore and offshore; United Kingdom UKCS offshore east of 6W including Channel Islands (Guernsey and Jersey). Egypt - Western Desert; Iraq - onshore; Jordan. European Datum 1950 references the International 1924 ellipsoid and the Greenwich prime meridian. European Datum 1950 origin is Fundamental point: Potsdam (Helmert Tower). Latitude: 5222'51.4456''N, longitude: 1303'58.9283''E (of Greenwich). European Datum 1950 is a geodetic datum for Topographic mapping, geodetic survey."
      - name: "Potsdam Datum"
        definition: "A geodetic datum first defined in 1990 suitable for use in Germany - Thuringen. Potsdam Datum/83 references the Bessel 1841 ellipsoid and the Greenwich prime meridian. Potsdam Datum/83 origin is Fundamental point: Rauenberg. Latitude: 5227'12.021''N, longitude: 1322'04.928''E (of Greenwich). This station was destroyed in 1910 and the station at Potsdam substituted as the fundamental point. Potsdam Datum/83 is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from BKG via EuroGeographics. http://crs.bkg.bund.de PD/83 is the realisation of DHDN in Thuringen. It is the resultant of applying a transformation derived at 13 points on the border between East and West Germany to *Pulkovo 1942*/83 points in Thuringen."
      - name: "Adindan"
        definition: "A geodetic datum first defined in 1958 suitable for use in Eritrea; Ethiopia; South Sudan; Sudan. Adindan references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Adindan origin is Fundamental point: Station 15; Adindan. Latitude: 2210'07.110''N, longitude: 3129'21.608''E (of Greenwich). Adindan is a geodetic datum for Topographic mapping. It was defined by information from US Coast and Geodetic Survey via Geophysical Reasearch vol 67 #11, October 1962. The 12th parallel traverse of 1966-70 (Point 58 datum, code 6620) is connected to the Blue Nile 1958 network in western Sudan. This has given rise to misconceptions that the Blue Nile network is used in west Africa."
      - name: "Afgooye"
        definition: "geodetic datum first defined in and suitable for use in Somalia - onshore. Afgooye references the Krassowsky 1940 ellipsoid and the Greenwich prime meridian. Afgooye is a geodetic datum for Topographic mapping."
      - name: "Ain el Abd 1970"
        definition: "A geodetic datum first defined in 1970 and suitable for use in Bahrain, Kuwait and Saudi Arabia - onshore. Ain el Abd 1970 references the International 1924 ellipsoid and the Greenwich prime meridian. Ain el Abd 1970 origin is Fundamental point: Ain El Abd. Latitude: 2814'06.171''N, longitude: 4816'20.906''E (of Greenwich). Ain el Abd 1970 is a geodetic datum for Topographic mapping."
      - name: "Anna 1 Astro 1965"
        definition: "A geodetic datum first defined in 1965 suitable for use in Cocos (Keeling) Islands - onshore. Cocos Islands 1965 references the Australian National Spheroid ellipsoid and the Greenwich prime meridian. Cocos Islands 1965 origin is Fundamental point: Anna 1. Cocos Islands 1965 is a geodetic datum for Military and topographic mapping It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Antigua Island Astro 1943"
        definition: "geodetic datum first defined in 1943 suitable for use in Antigua island - onshore. Antigua 1943 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Antigua 1943 origin is Fundamental point: station A14. Antigua 1943 is a geodetic datum for Topographic mapping. It was defined by information from Ordnance Survey of Great Britain."
      - name: "Arc 1950"
        definition: "A geodetic datum first defined in 1950 suitable for use in Botswana; Malawi; Zambia; Zimbabwe. Arc 1950 references the Clarke 1880 (Arc) ellipsoid and the Greenwich prime meridian. Arc 1950 origin is Fundamental point: Buffelsfontein. Latitude: 3359'32.000''S, longitude: 2530'44.622''E (of Greenwich). Arc 1950 is a geodetic datum for Topographic mapping, geodetic survey."
      - name: "Arc 1960"
        definition: "A geodetic datum first defined in 1960 suitable for use in Kenya; Tanzania; Uganda. Arc 1960 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Arc 1960 origin is Fundamental point: Buffelsfontein. Latitude: 3359'32.000''S, longitude: 2530'44.622''E (of Greenwich). Arc 1960 is a geodetic datum for Topographic mapping, geodetic survey."
      - name: "Ascension Island 1958"
        definition: "A geodetic datum first defined in 1958 suitable for use in St Helena, Ascension and Tristan da Cunha - Ascension Island - onshore. Ascension Island 1958 references the International 1924 ellipsoid and the Greenwich prime meridian. Ascension Island 1958 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Astro Beacon 'E' 1945"
        definition: "Astro beacon 'E' 1945"
      - name: "Astro DOS 71/4"
        definition: "A geodetic datum first defined in 1971 suitable for use in St Helena, Ascension and Tristan da Cunha - St Helena Island - onshore. Astro DOS 71 references the International 1924 ellipsoid and the Greenwich prime meridian. Astro DOS 71 origin is Fundamental point: DOS 71/4, Ladder Hill Fort, latitude: 1555'30''S, longitude: 543'25''W (of Greenwich). Astro DOS 71 is a geodetic datum for Geodetic control, military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000) and St. Helena Government, Environment and Natural Resources Directorate (ENRD)."
      - name: "Astro Tern Island (FRIG) 1961"
        definition: "A geodetic datum first defined in 1961 suitable for use in United States (USA) - Hawaii - Tern Island and Sorel Atoll. Tern Island 1961 references the International 1924 ellipsoid and the Greenwich prime meridian. Tern Island 1961 origin is Fundamental point: station FRIG on tern island, station B4 on Sorol Atoll. Tern Island 1961 is a geodetic datum for Military and topographic mapping It was defined by information from DMA / NIMA / NGA TR8350.2 (original 1987 first edition and 3rd edition, Amendment 1, 3 January 2000). Two independent astronomic determinations considered to be consistent through adoption of common transformation to WGS 84 (see tfm code 15795)."
      - name: "Astronomical Station 1952"
        definition: "Astronomical station 1952."
      - name: "Australian Geodetic 1966"
        definition: "A geodetic datum first defined in 1966 suitable for use in Australia - onshore and offshore. Papua New Guinea - onshore. Australian Geodetic Datum 1966 references the Australian National Spheroid ellipsoid and the Greenwich prime meridian. Australian Geodetic Datum 1966 origin is Fundamental point: Johnson Memorial Cairn. Latitude: 2556'54.5515''S, longitude: 13312'30.0771''E (of Greenwich). Australian Geodetic Datum 1966 is a geodetic datum for Topographic mapping. It was defined by information from Australian Map Grid Technical Manual. National Mapping Council of Australia Technical Publication 7; 1972."
      - name: "Australian Geodetic 1984"
        definition: "geodetic datum first defined in 1984 suitable for use in Australia - Queensland, South Australia, Western Australia, federal areas offshore west of 129E. Australian Geodetic Datum 1984 references the Australian National Spheroid ellipsoid and the Greenwich prime meridian. Australian Geodetic Datum 1984 origin is Fundamental point: Johnson Memorial Cairn. Latitude: 2556'54.5515''S, longitude: 13312'30.0771''E (of Greenwich). Australian Geodetic Datum 1984 is a geodetic datum for Topographic mapping. It was defined by information from 'GDA technical manual v2_2', Intergovernmental Committee on Surveying and Mapping. www.anzlic.org.au/icsm/gdtm/ Uses all data from 1966 adjustment with additional observations, improved software and a geoid model."
      - name: "Ayabelle Lighthouse"
        definition: "A geodetic datum suitable for use in Djibouti - onshore and offshore. Ayabelle Lighthouse references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Ayabelle Lighthouse origin is Fundamental point: Ayabelle Lighthouse. Ayabelle Lighthouse is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Bellevue (IGN)"
        definition: "A geodetic datum first defined in 1960 suitable for use in Vanuatu - southern islands - Aneityum, Efate, Erromango and Tanna. Bellevue references the International 1924 ellipsoid and the Greenwich prime meridian. Bellevue is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000). Datum covers all the major islands of Vanuatu in two different adjustment blocks, but practical usage is as given in the area of use."
      - name: "Bermuda 1957"
        definition: "A geodetic datum first defined in 1957 suitable for use in Bermuda - onshore. Bermuda 1957 references the Clarke 1866 ellipsoid and the Greenwich prime meridian. Bermuda 1957 origin is Fundamental point: Fort George base. Latitude 3222'44.36''N, longitude 6440'58.11''W (of Greenwich). Bermuda 1957 is a geodetic datum for Topographic mapping. It was defined by information from Various oil industry sources."
      - name: "Bissau"
        definition: "A geodetic datum first defined in and is suitable for use in Guinea-Bissau - onshore. Bissau references the International 1924 ellipsoid and the Greenwich prime meridian. Bissau origin is Bissau is a geodetic datum for Topographic mapping. It was defined by information from NIMA TR8350.2 ftp://164.214.2.65/pub/gig/tr8350.2/changes.pdf."
      - name: "Bogota Observatory"
        definition: "A geodetic datum first defined in 1975 suitable for use in Colombia - mainland and offshore Caribbean. Bogota 1975 references the International 1924 ellipsoid and the Greenwich prime meridian. Bogota 1975 origin is Fundamental point: Bogota observatory. Latitude: 435'56.570''N, longitude: 7404'51.300''W (of Greenwich). Bogota 1975 is a geodetic datum for Topographic mapping. It was defined by information from Instituto Geografico Agustin Codazzi (IGAC) special publication no. 1, 4th edition (1975) 'Geodesia: Resultados Definitvos de Parte de las Redes Geodesicas Establecidas en el Pais'. Replaces 1951 adjustment. Replaced by MAGNA-SIRGAS (datum code 6685)."
      - name: "Bukit Rimpah"
        definition: "geodetic datum suitable for use in Indonesia - Banga and Belitung Islands. Bukit Rimpah references the Bessel 1841 ellipsoid and the Greenwich prime meridian. Bukit Rimpah origin is 200'40.16''S, 10551'39.76''E (of Greenwich). Bukit Rimpah is a geodetic datum for Topographic mapping."
      - name: "Camp Area Astro"
        definition: "geodetic datum suitable for use in Antarctica - McMurdo Sound, Camp McMurdo area. Camp Area Astro references the International 1924 ellipsoid and the Greenwich prime meridian. Camp Area Astro is a geodetic datum for Geodetic and topographic survey. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Campo Inchauspe 1969"
        definition: "A geodetic datum suitable for use in Argentina - mainland onshore and Atlantic offshore Tierra del Fuego. Campo Inchauspe references the International 1924 ellipsoid and the Greenwich prime meridian. Campo Inchauspe origin is Fundamental point: Campo Inchauspe. Latitude: 3558'16.56''S, longitude: 6210'12.03''W (of Greenwich). Campo Inchauspe is a geodetic datum for Topographic mapping. It was defined by information from NIMA http://earth-info.nima.mil/"
      - name: "Canton Astro 1966"
        definition: "A geodetic datum first defined in 1966 suitable for use in Kiribati - Phoenix Islands: Kanton, Orona, McKean Atoll, Birnie Atoll, Phoenix Seamounts. Phoenix Islands 1966 references the International 1924 ellipsoid and the Greenwich prime meridian. Phoenix Islands 1966 is a geodetic datum for Military and topographic mapping It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Cape Datum"
        definition: "A geodetic datum suitable for use in Botswana; Lesotho; South Africa - mainland; Swaziland. Cape references the Clarke 1880 (Arc) ellipsoid and the Greenwich prime meridian. Cape origin is Fundamental point: Buffelsfontein. Latitude: 3359'32.000''S, longitude: 2530'44.622''E (of Greenwich). Cape is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from Private Communication, Directorate of Surveys and Land Information, Cape Town."
      - name: "Cape Canaveral"
        definition: "A geodetic datum first defined in 1963 suitable for use in North America - onshore - Bahamas and USA - Florida (east). Cape Canaveral references the Clarke 1866 ellipsoid and the Greenwich prime meridian. Cape Canaveral origin is Fundamental point: Central 1950. Latitude: 28 29'32.36555''N, longitude 80 34'38.77362''W (of Greenwich). Cape Canaveral is a geodetic datum for US space and military operations. It was defined by information from US NGS and DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Carthage"
        definition: "A geodetic datum first defined in 1925 suitable for use in Tunisia - onshore and offshore. Carthage references the Clarke 1880 (IGN) ellipsoid and the Greenwich prime meridian. Carthage origin is Fundamental point: Carthage. Latitude: 40.9464506g = 3651'06.50''N, longitude: 8.8724368g E of Paris = 1019'20.72''E (of Greenwich). Carthage is a geodetic datum for Topographic mapping. Fundamental point astronomic coordinates determined in 1878."
      - name: "Chatam Island Astro 1971"
        definition: "A geodetic datum first defined in 1971 suitable for use in New Zealand - Chatham Islands group - onshore. Chatham Islands Datum 1971 references the International 1924 ellipsoid and the Greenwich prime meridian. Chatham Islands Datum 1971 is a geodetic datum for Geodetic survey, topographic mapping, engineering survey. It was defined by information from Office of Surveyor General (OSG) Technical Report 14, June 2001. Replaced by Chatham Islands Datum 1979 (code 6673)."
      - name: "Chua Astro"
        definition: "A geodetic datum suitable for use in Brazil - south of 18S and west of 54W, plus Distrito Federal. Paraguay - north. Chua references the International 1924 ellipsoid and the Greenwich prime meridian. Chua origin is Fundamental point: Chua. Latitude: 1945'41.160''S, longitude: 4806'07.560''W (of Greenwich). Chua is a geodetic datum for Geodetic survey. It was defined by information from NIMA http://earth-info.nima.mil/. The Chua origin and associated network is in Brazil with a connecting traverse through northern Paraguay. It was used in Brazil only as input into the Corrego Allegre adjustment and for government work in Distrito Federal."
      - name: "Corrego Alegre"
        definition: "A geodetic datum first defined in 1972 suitable for use in Brazil - onshore - west of 54W and south of 18S; also south of 15S between 54W and 42W; also east of 42W. Corrego Alegre 1970-72 references the International 1924 ellipsoid and the Greenwich prime meridian. Corrego Alegre 1970-72 origin is Fundamental point: Corrego Alegre. Latitude: 1950'14.91''S, longitude: 4857'41.98''W (of Greenwich). Corrego Alegre 1970-72 is a geodetic datum for Topographic mapping, geodetic survey. Superseded by SAD69. It was defined by information from IBGE. Replaces 1961 adjustment (datum code 1074). NIMA gives coordinates of origin as latitude: 1950'15.14''S, longitude: 4857'42.75''W; these may refer to 1961 adjustment."
      - name: "Dabola"
        definition: "A geodetic datum first defined in 1981 suitable for use in Guinea - onshore. Dabola 1981 references the Clarke 1880 (IGN) ellipsoid and the Greenwich prime meridian. Dabola 1981 is a geodetic datum for Topographic mapping. It was defined by information from IGN Paris."
      - name: "Djakarta (Batavia)"
        definition: "A geodetic datum suitable for use in Indonesia - onshore Java and Bali. Batavia (Jakarta) references the Bessel 1841 ellipsoid and the Jakarta prime meridian. Batavia (Jakarta) origin is Fundamental point: Longitude at Batavia astronomical station. Latitude: 607'39.522''S, longitude: 000'00.0''E (of Jakarta). Latitude and azimuth at Genuk. Batavia (Jakarta) is a geodetic datum for Topographic mapping."
      - name: "DOS 1968"
        definition: "DOS 1968."
      - name: "Easter Island 1967"
        definition: "A geodetic datum first defined in 1967 suitable for use in Chile - Easter Island onshore. Easter Island 1967 references the International 1924 ellipsoid and the Greenwich prime meridian. Easter Island 1967 is a geodetic datum for Military and topographic mapping, +/- 25 meters in each component. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "European 1979"
        definition: "A geodetic datum first defined in 1979 suitable for use in Europe - west. European Datum 1979 references the International 1924 ellipsoid and the Greenwich prime meridian. European Datum 1979 origin is Fundamental point: Potsdam (Helmert Tower). Latitude: 5222'51.4456''N, longitude: 1303'58.9283''E (of Greenwich). European Datum 1979 is a geodetic datum for Scientific network. Replaced by 1987 adjustment."
      - name: "Fort Thomas 1955"
        definition: "Fort Thomas 1955 datum."
      - name: "Gan 1970"
        definition: "A geodetic datum first defined in 1970 suitable for use in Maldives - onshore. Gan 1970 references the International 1924 ellipsoid and the Greenwich prime meridian. Gan 1970 is a geodetic datum for Topographic mapping. It was defined by information from Various industry sources. In some references incorrectly named 'Gandajika 1970'."
      - name: "Geodetic Datum 1949"
        definition: "A geodetic datum first defined in 1949 suitable for use in New Zealand - North Island, South Island, Stewart Island - onshore and nearshore. New Zealand Geodetic Datum 1949 references the International 1924 ellipsoid and the Greenwich prime meridian. New Zealand Geodetic Datum 1949 origin is Fundamental point: Papatahi. Latitude: 4119' 8.900''S, longitude: 17502'51.000''E (of Greenwich). New Zealand Geodetic Datum 1949 is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from Land Information New Zealand. http://www.linz.govt.nz/rcs/linz/pub/web/root/core/SurveySystem/GeodeticInfo/GeodeticDatums/nzgd2000factsheet/index.jsp. Replaced by New Zealand Geodetic Datum 2000 (code 6167) from March 2000."
      - name: "Graciosa Base SW 1948"
        definition: "Graciosa Base SW 1948 datum."
      - name: "Guam 1963"
        definition: "A geodetic datum first defined in 1963 suitable for use in Guam - onshore. Guam 1963 references the Clarke 1866 ellipsoid and the Greenwich prime meridian. Guam 1963 origin is Fundamental point: Tagcha. Latitude: 1322'38.49''N, longitude: 14445'51.56''E (of Greenwich). Guam 1963 is a geodetic datum for Topographic mapping. It was defined by information from US National Geospatial Intelligence Agency (NGA). http://earth-info.nga.mil/ Replaced by NAD83(HARN)"
      - name: "Gunung Segara"
        definition: "A geodetic datum suitable for use in Indonesia - Kalimantan - onshore east coastal area including Mahakam delta coastal and offshore shelf areas. Gunung Segara references the Bessel 1841 ellipsoid and the Greenwich prime meridian. Gunung Segara origin is Station P5 (Gunung Segara). Latitude 032'12.83''S, longitude 11708'48.47''E (of Greenwich). Gunung Segara is a geodetic datum for Topographic mapping. It was defined by information from TotalFinaElf."
      - name: "GUX 1 Astro"
        definition: "GUX 1 Astro datum."
      - name: "Herat North"
        definition: "A geodetic datum suitable for use in Afghanistan. Herat North references the International 1924 ellipsoid and the Greenwich prime meridian. Herat North origin is Fundamental point: Herat North. Latitude: 3423'09.08''N, longitude: 6410'58.94''E (of Greenwich). Herat North is a geodetic datum for Topographic mapping. It was defined by information from NIMA http://earth-info.nima.mil/."
      - name: "Hjorsey 1955"
        definition: "A geodetic datum first defined in 1955 suitable for use in Iceland - onshore. Hjorsey 1955 references the International 1924 ellipsoid and the Greenwich prime meridian. Hjorsey 1955 origin is Fundamental point: Latitude: 6431'29.26''N, longitude: 2222'05.84''W (of Greenwich). Hjorsey 1955 is a geodetic datum for 1/50,000 scale topographic mapping. It was defined by information from Landmaelingar Islands (National Survey of Iceland)."
      - name: "Hong Kong 1963"
        definition: "A geodetic datum first defined in 1963 suitable for use in China - Hong Kong - onshore and offshore. Hong Kong 1963 references the Clarke 1858 ellipsoid and the Greenwich prime meridian. Hong Kong 1963 origin is Fundamental point: Trig 'Zero', 38.4 feet south along the transit circle of the Kowloon Observatory. Latitude 2218'12.82''N, longitude 11410'18.75''E (of Greenwich). Hong Kong 1963 is a geodetic datum for Topographic mapping and hydrographic charting. It was defined by information from Survey and Mapping Office, Lands Department. http://www.info.gov.hk/landsd/. Replaced by Hong Kong 1963(67) for military purposes only in 1967. Replaced by Hong Kong 1980."
      - name: "Hu-Tzu-Shan"
        definition: "A geodetic datum first defined in 1950 suitable for use in Taiwan, Republic of China - onshore - Taiwan Island, Penghu (Pescadores) Islands. Hu Tzu Shan 1950 references the International 1924 ellipsoid and the Greenwich prime meridian. Hu Tzu Shan 1950 origin is Fundamental point: Hu Tzu Shan. Latitude: 2358'32.34''N, longitude: 12058'25.975''E (of Greenwich). Hu Tzu Shan 1950 is a geodetic datum for Topographic mapping. It was defined by information from NIMA US NGA, http://earth-info.nga.mil/GandG/index.html"
      - name: "Indian"
        definition: "Indian datum."
      - name: "Indian 1954"
        definition: "A geodetic datum first defined in 1954 suitable for use in Myanmar (Burma) - onshore; Thailand - onshore. Indian 1954 references the Everest 1830 (1937 Adjustment) ellipsoid and the Greenwich prime meridian. Indian 1954 origin is Extension of Kalianpur 1937 over Myanmar and Thailand. Indian 1954 is a geodetic datum for Topographic mapping."
      - name: "Indian 1975"
        definition: "A geodetic datum first defined in 1975 suitable for use in Thailand - onshore plus offshore Gulf of Thailand. Indian 1975 references the Everest 1830 (1937 Adjustment) ellipsoid and the Greenwich prime meridian. Indian 1975 origin is Fundamental point: Khau Sakaerang. Indian 1975 is a geodetic datum for Topographic mapping."
      - name: "Ireland 1965"
        definition: "A geodetic datum first defined in 1975 suitable for use in Ireland - onshore. United Kingdom (UK) - Northern Ireland (Ulster) - onshore. Ireland 1965 references the Airy Modified 1849 ellipsoid and the Greenwich prime meridian. Ireland 1965 origin is Adjusted to best mean fit 9 stations of the OSNI 1952 primary adjustment in Northern Ireland plus the 1965 values of 3 stations in the Republic of Ireland. Ireland 1965 is a geodetic datum for Geodetic survey, topographic mapping and engineering survey. It was defined by information from 'The Irish Grid - A Description of the Co-ordinate Reference System' published by *Ordnance Survey of Ireland*, Dublin and Ordnance Survey of Northern Ireland, Belfast. Differences from the 1965 adjustment (datum code 6299) are: average difference in Eastings 0.092m; average difference in Northings 0.108m; maximum vector difference 0.548m."
      - name: "ISTS 061 Astro 1968"
        definition: "A geodetic datum first defined in 1968 suitable for use in South Georgia and the South Sandwich Islands - South Georgia onshore. ISTS 061 Astro 1968 references the International 1924 ellipsoid and the Greenwich prime meridian. ISTS 061 Astro 1968 origin is Fundamental point: ISTS 061. ISTS 061 Astro 1968 is a geodetic datum for Military and topographic mapping It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "ISTS 073 Astro 1969"
        definition: "A geodetic datum first defined in 1969 suitable for use in British Indian Ocean Territory - Chagos Archipelago - Diego Garcia. ISTS 073 Astro 1969 references the International 1924 ellipsoid and the Greenwich prime meridian. ISTS 073 Astro 1969 origin is Fundamental point: ISTS 073. ISTS 073 Astro 1969 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Johnston Island 1961"
        definition: "A geodetic datum first defined in 1961 suitable for use in United States Minor Outlying Islands - Johnston Island. Johnston Island 1961 references the International 1924 ellipsoid and the Greenwich prime meridian. Johnston Island 1961 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Kandawala"
        definition: "A geodetic datum first defined in 1930 suitable for use in Sri Lanka - onshore. Kandawala references the Everest 1830 (1937 Adjustment) ellipsoid and the Greenwich prime meridian. Kandawala origin is Fundamental point: Kandawala. Latitude: 714'06.838''N, longitude: 7952'36.670''E. Kandawala is a geodetic datum for Topographic mapping. It was defined by information from Abeyratne, Featherstone and Tantrigoda in Survey Review vol. 42 no. 317 (July 2010)."
      - name: "Kerguelen Island 1949"
        definition: "A geodetic datum first defined in 1949 suitable for use in French Southern Territories - Kerguelen onshore. References the International 1924 ellipsoid and the Greenwich prime meridian. Origin is K0 1949. Is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from IGN Paris."
      - name: "Kertau 1968"
        definition: "A geodetic datum first defined in 1968 suitable for use in Malaysia - West Malaysia onshore and offshore east coast; Singapore - onshore and offshore. Kertau 1968 references the Everest 1830 Modified ellipsoid and the Greenwich prime meridian. Kertau 1968 origin is Fundamental point: Kertau. Latitude: 327'50.710''N, longitude: 10237'24.550''E (of Greenwich). Kertau 1968 is a geodetic datum for Geodetic survey, cadastre. It was defined by information from Defence Geographic Centre. Replaces MRT48 and earlier adjustments. Adopts metric conversion of 39.370113 inches per metre. Not used for 1969 metrication of RSO grid - see Kertau (RSO) (code 6751)."
      - name: "Kusaie Astro 1951"
        definition: "A geodetic datum first defined in 1951 suitable for use in Federated States of Micronesia - Kosrae (Kusaie). Kusaie 1951 references the International 1924 ellipsoid and the Greenwich prime meridian. Kusaie 1951 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "L. C. 5 Astro 1961"
        definition: "L. C. 5 Astro 1961 datum."
      - name: "Leigon"
        definition: "A geodetic datum suitable for use in Ghana - onshore and offshore. Leigon references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Leigon origin is Fundamental point: GCS Station 121, Leigon. Latitude: 538'52.27''N, longitude: 011'46.08''W (of Greenwich). Leigon is a geodetic datum for Topographic mapping. It was defined by information from Ordnance Survey International. Replaced Accra datum (code 6168) from 1978. Coordinates at Leigon fundamental point defined as Accra datum values for that point."
      - name: "Liberia 1964"
        definition: "A geodetic datum first defined in 1964 suitable for use in Liberia - onshore. Liberia 1964 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Liberia 1964 origin is Fundamental point: Robertsfield. Latitude: 613'53.02''N, longitude: 1021'35.44''W (of Greenwich). Liberia 1964 is a geodetic datum for Topographic mapping. It was defined by information from NIMA http://earth-info.nima.mil/."
      - name: "Luzon"
        definition: "A geodetic datum first defined in 1911 suitable for use in Philippines - onshore. Luzon references the Clarke 1866 ellipsoid and the Greenwich prime meridian. Luzon origin is Fundamental point: Balacan. Latitude: 1333'41.000''N, longitude: 12152'03.000''E (of Greenwich). Luzon is a geodetic datum for Topographic mapping. It was defined by information from Coast and Geodetic Survey Replaced by Philippine Reference system of 1992 (datum code 6683)."
      - name: "Mahe 1971"
        definition: "A geodetic datum first defined in 1971 suitable for use in Seychelles - Mahe Island. Mahe 1971 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Mahe 1971 origin is Fundamental point: Station SITE. Latitude: 440'14.644''S, longitude: 5528'44.488''E (of Greenwich). Mahe 1971 is a geodetic datum for US military survey. It was defined by information from Clifford Mugnier's September 2007 PE&RS 'Grids and Datums' article on Seychelles (www.asprs.org/resources/grids/). South East Island 1943 (datum code 1138) used for topographic mapping, cadastral and hydrographic survey."
      - name: "Massawa"
        definition: "A geodetic datum suitable for use in Eritrea - onshore and offshore. Massawa references the Bessel 1841 ellipsoid and the Greenwich prime meridian. Massawa is a geodetic datum for Topographic mapping."
      - name: "Merchich"
        definition: "A geodetic datum first defined in 1922 suitable for use in Morocco - onshore. Merchich references the Clarke 1880 (IGN) ellipsoid and the Greenwich prime meridian. Merchich origin is Fundamental point: Merchich. Latitude: 3326'59.672''N, longitude: 733'27.295''W (of Greenwich). Merchich is a geodetic datum for Topographic mapping."
      - name: "Midway Astro 1961"
        definition: "A geodetic datum first defined in 1961 suitable for use in United States Minor Outlying Islands - Midway Islands - Sand Island and Eastern Island. Midway 1961 references the International 1924 ellipsoid and the Greenwich prime meridian. Midway 1961 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Minna"
        definition: "A geodetic datum suitable for use in Nigeria - onshore and offshore. Minna references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Minna origin is Fundamental point: Minna base station L40. Latitude: 938'08.87''N, longitude: 630'58.76''E (of Greenwich). Minna is a geodetic datum for Topographic mapping. It was defined by information from NIMA http://earth-info.nima.mil/."
      - name: "Montserrat Island Astro 1958"
        definition: "A geodetic datum first defined in 1958 suitable for use in Montserrat - onshore. Montserrat 1958 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Montserrat 1958 origin is Fundamental point: station M36. Montserrat 1958 is a geodetic datum for Topographic mapping. It was defined by information from Ordnance Survey of Great Britain."
      - name: "M'poraloko"
        definition: "A geodetic datum suitable for use in Gabon - onshore and offshore. M'poraloko references the Clarke 1880 (IGN) ellipsoid and the Greenwich prime meridian. M'poraloko is a geodetic datum for Topographic mapping."
      - name: "Nahrwan"
        definition: "A geodetic datum first defined in 1934 suitable for use in Iraq - onshore; Iran - onshore northern Gulf coast and west bordering southeast Iraq. Nahrwan 1934 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Nahrwan 1934 origin is Fundamental point: Nahrwan south base. Latitude: 3319'10.87''N, longitude: 4443'25.54''E (of Greenwich). Nahrwan 1934 is a geodetic datum for Oil exploration and production. It was defined by information from Various industry sources. This adjustment later discovered to have a significant orientation error. In Iran replaced by FD58. In Iraq, replaced by Karbala 1979."
      - name: "Naparima, BWI"
        definition: "A geodetic datum first defined in 1972 suitable for use in Trinidad and Tobago - Tobago - onshore. Naparima 1972 references the International 1924 ellipsoid and the Greenwich prime meridian. Naparima 1972 origin is Fundamental point: Naparima. Latitude: 1016'44.860''N, longitude: 6127'34.620''W (of Greenwich). Naparima 1972 is a geodetic datum for Topographic mapping. It was defined by information from Ordnance Survey International. Naparima 1972 is an extension of the Naparima 1955 network of Trinidad to include Tobago."
      - name: "North American 1927"
        definition: "A geodetic datum first defined in 1927 suitable for use in North and central America; Antigua and Barbuda; Bahamas; Belize; British Virgin Islandss. Usage shall be onshore only except that onshore and offshore shall apply to Canada east coast (New Brunswick; Newfoundland and Labrador; Prince Edward Island; Quebec). Cuba. Mexico (Gulf of Mexico and Caribbean coasts only). USA Alaska. USA Gulf of Mexico (Alabama; Florida; Louisiana; Mississippi; Texas). USA East Coast. Bahamas onshore plus offshore over internal continental shelf only. North American Datum 1927 references the Clarke 1866 ellipsoid and the Greenwich prime meridian. North American Datum 1927 origin is Fundamental point: Meade's Ranch. Latitude: 3913'26.686''N, longitude: 9832'30.506''W (of Greenwich). North American Datum 1927 is a geodetic datum for Topographic mapping. In United States (USA) and Canada, replaced by North American Datum 1983 (NAD83) (code 6269) ; in Mexico, replaced by Mexican Datum of 1993 (code 1042)."
      - name: "North American 1983"
        definition: "A geodetic datum first defined in 1986 suitable for use in North America - onshore and offshore: Canada; *Puerto Rico*; United States (USA); US Virgin Islands; British Virgin Islands. North American Datum 1983 references the GRS 1980 ellipsoid and the Greenwich prime meridian. North American Datum 1983 origin is Origin at geocentre. North American Datum 1983 is a geodetic datum for Topographic mapping. Although the 1986 adjustment included connections to Greenland and Mexico, it has not been adopted there. In Canada and US, replaced NAD27."
      - name: "Observatorio Meteorologico 1939"
        definition: "A geodetic datum first defined in 1939 suitable for use in Portugal - western Azores onshore - Flores, Corvo. Azores Occidental Islands 1939 references the International 1924 ellipsoid and the Greenwich prime meridian. Azores Occidental Islands 1939 origin is Fundamental point: Observatario Meteorologico Flores. Azores Occidental Islands 1939 is a geodetic datum for Topographic mapping. It was defined by information from Instituto Geografico e Cadastral Lisbon via EuroGeographics; http://crs.bkg.bund.de/crs-eu/."
      - name: "Old Egyptian 1907"
        definition: "A geodetic datum first defined in 1907 suitable for use in Egypt - onshore and offshore. Egypt 1907 references the Helmert 1906 ellipsoid and the Greenwich prime meridian. Egypt 1907 origin is Fundamental point: Station F1 (Venus). Latitude: 3001'42.86''N, longitude: 3116'33.60''E (of Greenwich). Egypt 1907 is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey."
      - name: "Old Hawaiian"
        definition: "A geodetic datum suitable for use in United States (USA) - Hawaii - main islands onshore. Old Hawaiian references the Clarke 1866 ellipsoid and the Greenwich prime meridian. Old Hawaiian origin is Fundamental point: Oahu West Base Astro. Latitude: 2118'13.89''N, longitude 15750'55.79''W (of Greenwich). Old Hawaiian is a geodetic datum for Topographic mapping. It was defined by information from http://www.ngs.noaa.gov/ (NADCON readme file). Hawaiian Islands were never on NAD27 but rather on Old Hawaiian Datum. NADCON conversion program provides transformation from Old Hawaiian Datum to NAD83 (original 1986 realization) but making the transformation appear to user as if from NAD27."
      - name: "Oman"
        definition: "A geodetic datum first defined in 2013 suitable for use in Oman - onshore and offshore. Oman National Geodetic Datum 2014 references the GRS 1980 ellipsoid and the Greenwich prime meridian. Oman National Geodetic Datum 2014 origin is 20 stations of the Oman primary network tied to ITRF2008 at epoch 2013.15. Oman National Geodetic Datum 2014 is a geodetic datum for Geodetic Survey. It was defined by information from National Survey Authority, Sultanate of Oman. Replaces WGS 84 (G874)."
      - name: "Ordnance Survey of Great Britain 1936"
        definition: "A geodetic datum first defined in 1936 suitable for use in United Kingdom (UK) - offshore to boundary of UKCS within 4946'N to 6101'N and 733'W to 333'E; onshore Great Britain (England, Wales and Scotland). Isle of Man onshore. OSGB 1936 references the Airy 1830 ellipsoid and the Greenwich prime meridian. OSGB 1936 origin is Prior to 2002, fundamental point: Herstmonceux, Latitude: 5051'55.271''N, longitude: 020'45.882''E (of Greenwich). From April 2002 the datum is defined through the application of the OSTN transformation from ETRS89. OSGB 1936 is a geodetic datum for Topographic mapping. It was defined by information from Ordnance Survey of Great Britain. The average accuracy of OSTN compared to the old triangulation network (down to 3rd order) is 0.1m. With the introduction of OSTN15, the area for OSGB 1936 has effectively been extended from Britain to cover the adjacent UK Continental Shelf."
      - name: "Pico de las Nieves"
        definition: "A geodetic datum suitable for use in Spain - Canary Islands onshore. Pico de las Nieves 1984 references the International 1924 ellipsoid and the Greenwich prime meridian. Pico de las Nieves 1984 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000). Replaces Pico de las Nieves 1968 (PN68). Replaced by REGCAN95."
      - name: "Pitcairn Astro 1967"
        definition: "A geodetic datum first defined in 1967 suitable for use in Pitcairn - Pitcairn Island. Pitcairn 1967 references the International 1924 ellipsoid and the Greenwich prime meridian. Pitcairn 1967 origin is Fundamental point: Pitcairn Astro. Latitude: 2504'06.87''S, longitude: 13006'47.83''W (of Greenwich). Pitcairn 1967 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000). Replaced by Pitcairn 2006."
      - name: "Point 58"
        definition: "A geodetic datum first defined in 1969 suitable for use in Senegal - central, Mali - southwest, Burkina Faso - central, Niger - southwest, Nigeria - north, Chad - central. All in proximity to the parallel of latitude of 12N. Point 58 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Point 58 origin is Fundamental point: Point 58. Latitude: 1252'44.045''N, longitude: 358'37.040''E (of Greenwich). Point 58 is a geodetic datum for Geodetic survey. It was defined by information from IGN Paris. Used as the basis for computation of the 12th Parallel traverse conducted 1966-70 from Senegal to Chad and connecting to the Blue Nile 1958 (Adindan) triangulation in Sudan."
      - name: "Pointe Noire 1948"
        definition: "Pointe Noire 1948 datum."
      - name: "Porto Santo 1936"
        definition: "A geodetic datum first defined in 1936 suitable for use in Portugal - Madeira, Porto Santo and Desertas islands - onshore. Porto Santo 1936 references the International 1924 ellipsoid and the Greenwich prime meridian. Porto Santo 1936 origin is SE Base on Porto Santo island. Porto Santo 1936 is a geodetic datum for Topographic mapping. It was defined by information from Instituto Geografico e Cadastral Lisbon http://www.igeo.pt Replaced by 1995 adjustment (datum code 6663). For Selvagens see Selvagem Grande (code 6616)."
      - name: "Provisional South American 1956"
        definition: "A geodetic datum first defined in 1956 suitable for use in Aruba - onshore; Bolivia; Bonaire - onshore; Brazil - offshore - Amazon Cone shelf; Chile - onshore north of 4330'S; Curacao - onshore; Ecuador - mainland onshore; Guyana - onshore; Peru - onshore; Venezuela - onshore. Provisional South American Datum 1956 references the International 1924 ellipsoid and the Greenwich prime meridian. Provisional South American Datum 1956 origin is Fundamental point: La Canoa. Latitude: 834'17.170''N, longitude: 6351'34.880''W (of Greenwich). Provisional South American Datum 1956 is a geodetic datum for Topographic mapping. Same origin as La Canoa datum."
      - name: "Provisional South Chilean 1963"
        definition: "A geodetic datum first defined in 1963 suitable for use in Argentina and Chile - Tierra del Fuego, onshore. Hito XVIII 1963 references the International 1924 ellipsoid and the Greenwich prime meridian. Hito XVIII 1963 origin is Chile-Argentina boundary survey. Hito XVIII 1963 is a geodetic datum for Geodetic survey. It was defined by information from Various oil company records. Used in Tierra del Fuego."
      - name: "Puerto Rico"
        definition: "A geodetic datum first defined in 1901 suitable for use in Puerto Rico, US Virgin Islands and British Virgin Islands - onshore. Puerto Rico references the Clarke 1866 ellipsoid and the Greenwich prime meridian. Puerto Rico origin is Fundamental point: Cardona Island Lighthouse. Latitude:1757'31.40''N, longitude: 6638'07.53''W (of Greenwich). Puerto Rico is a geodetic datum for Topographic mapping. It was defined by information from Ordnance Survey of Great Britain and http://www.ngs.noaa.gov/ (NADCON readme file). NADCON conversion program provides transformation from Puerto Rico Datum to NAD83 (original 1986 realization) but making the transformation appear to user as if from NAD27."
      - name: "Qatar National"
        definition: "A geodetic datum first defined in 1995 suitable for use in Qatar - onshore. Qatar National Datum 1995 references the International 1924 ellipsoid and the Greenwich prime meridian. Qatar National Datum 1995 origin is defined by transformation from WGS 84 - see coordinate operation code 1840. Qatar National Datum 1995 is a geodetic datum for Topographic mapping. It was defined by information from Qatar Centre for Geographic Information."
      - name: "Qornoq"
        definition: "A geodetic datum first defined in 1927 suitable for use in Greenland - west coast onshore. Qornoq 1927 references the International 1924 ellipsoid and the Greenwich prime meridian. Qornoq 1927 origin is Fundamental point: Station 7008. Latitude: 6431'06.27''N, longitude: 5112'24.86''W (of Greenwich). Qornoq 1927 is a geodetic datum for Topographic mapping. It was defined by information from Kort & Matrikelstyrelsen, Copenhagen. Origin coordinates from NIMA http://earth-info.nima.mil/."
      - name: "Reunion"
        definition: "A geodetic datum first defined in 1947 suitable for use in Reunion - onshore. Reunion 1947 references the International 1924 ellipsoid and the Greenwich prime meridian. Reunion 1947 origin is Fundamental point: Piton des Neiges (Borne). Latitude: 2105'13.119''S, longitude: 5529'09.193''E (of Greenwich). Reunion 1947 is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from IGN Paris. Replaced by RGR92 (datum code 6627)."
      - name: "Rome 1940"
        definition: "A geodetic datum first defined in and is suitable for use in Italy - onshore and offshore; San Marino, Vatican City State. Monte Mario (Rome) references the International 1924 ellipsoid and the Rome prime meridian. Monte Mario (Rome) origin is Fundamental point: Monte Mario. Latitude: 4155'25.51''N, longitude: 000' 00.00''E (of Rome). Monte Mario (Rome) is a geodetic datum for Topographic mapping. Replaced Genova datum, Bessel 1841 ellipsoid, from 1940."
      - name: "Santo (DOS) 1965"
        definition: "A geodetic datum first defined in 1965 suitable for use in Vanuatu - northern islands - Aese, Ambrym, Aoba, Epi, Espiritu Santo, Maewo, Malo, Malkula, Paama, Pentecost, Shepherd and Tutuba. Santo 1965 references the International 1924 ellipsoid and the Greenwich prime meridian. Santo 1965 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000). Datum covers all the major islands of Vanuatu in two different adjustment blocks, but practical usage is as given in the area of use."
      - name: "Sao Braz"
        definition: "A geodetic datum first defined in 1995 suitable for use in Portugal - eastern Azores onshore - Sao Miguel, Santa Maria, Formigas. Azores Oriental Islands 1995 references the International 1924 ellipsoid and the Greenwich prime meridian. Azores Oriental Islands 1995 origin is Fundamental point: Forte de So Bras. Origin and orientation constrained to those of the 1940 adjustment. Azores Oriental Islands 1995 is a geodetic datum for Topographic mapping. It was defined by information from Instituto Geografico e Cadastral Lisbon; http://www.igeo.pt/ Classical and GPS observations. Replaces 1940 adjustment (datum code 6184)."
      - name: "Sapper Hill 1943"
        definition: "A geodetic datum first defined in 1943 suitable for use in Falkland Islands (Malvinas) - onshore. Sapper Hill 1943 references the International 1924 ellipsoid and the Greenwich prime meridian. Sapper Hill 1943 is a geodetic datum for Topographic mapping."
      - name: "Schwarzeck"
        definition: "A geodetic datum suitable for use in Namibia - onshore and offshore. Schwarzeck references the Bessel Namibia (GLM) ellipsoid and the Greenwich prime meridian. Schwarzeck origin is Fundamental point: Schwarzeck. Latitude: 2245'35.820''S, longitude: 1840'34.549''E (of Greenwich). Fixed during German South West Africa-British Bechuanaland boundary survey of 1898-1903. Schwarzeck is a geodetic datum for Topographic mapping. It was defined by information from Private Communication, Directorate of Surveys and Land Information, Cape Town."
      - name: "Selvagem Grande 1938"
        definition: "A geodetic datum suitable for use in Portugal - Selvagens islands (Madeira province) - onshore. Selvagem Grande references the International 1924 ellipsoid and the Greenwich prime meridian. Selvagem Grande is a geodetic datum for Topographic mapping. It was defined by information from Instituto Geografico e Cadastral Lisbon http://www.igeo.pt."
      - name: "South American 1969"
        definition: "A geodetic datum first defined in 1969 suitable for use in Brazil - onshore and offshore. In rest of South America - onshore north of approximately 45S and Tierra del Fuego. South American Datum 1969 references the GRS 1967 Modified ellipsoid and the Greenwich prime meridian. South American Datum 1969 origin is Fundamental point: Chua. Geodetic latitude: 1945'41.6527''S; geodetic longitude: 4806'04.0639''W (of Greenwich). (Astronomic coordinates: Latitude 1945'41.34''S +/- 0.05'', longitude 4806'07.80''W +/- 0.08''). South American Datum 1969 is a geodetic datum for Topographic mapping. It was defined by information from DMA 1974. SAD69 uses GRS 1967 ellipsoid but with 1/f to exactly 2 decimal places. In Brazil only, replaced by SAD69(96) (datum code 1075)."
      - name: "South Asia"
        definition: "South Asia datum."
      - name: "Tananarive Observatory 1925"
        definition: "A geodetic datum first defined in 1925 suitable for use in Madagascar - onshore and nearshore. Tananarive 1925 references the International 1924 ellipsoid and the Greenwich prime meridian. Tananarive 1925 origin is Fundamental point: Tananarive observatory. Latitude: 1855'02.10''S, longitude: 4733'06.75''E (of Greenwich). Tananarive 1925 is a geodetic datum for Topographic mapping. It was defined by information from IGN Paris."
      - name: "Timbalai 1948"
        definition: "A geodetic datum first defined in 1948 suitable for use in Brunei - onshore and offshore; Malaysia - East Malaysia (Sabah; Sarawak) - onshore and offshore. Timbalai 1948 references the Everest 1830 (1967 Definition) ellipsoid and the Greenwich prime meridian. Timbalai 1948 origin is Fundamental point: Station P85 at Timbalai. Latitude: 517' 3.548''N, longitude: 11510'56.409''E (of Greenwich). Timbalai 1948 is a geodetic datum for Topographic mapping. It was defined by information from Defence Geographic Centre. In 1968, the original adjustment was densified in Sarawak and extended to Sabah."
      - name: "Tokyo"
        definition: "A geodetic datum first defined in 1918 suitable for use in Japan - onshore; North Korea - onshore; South Korea - onshore. Tokyo references the Bessel 1841 ellipsoid and the Greenwich prime meridian. Tokyo origin is Fundamental point: Nikon-Keido-Genten. Latitude: 3539'17.5148''N, longitude: 13944'40.5020''E (of Greenwich). Longitude derived in 1918. Tokyo is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from Geographic Survey Institute; Japan; Bulletin 40 (March 1994). Also http://vldb.gsi.go.jp/sokuchi/datum/tokyodatum.html. In Japan, replaces Tokyo 1892 (code 1048) and replaced by Japanese Geodetic Datum 2000 (code 6611). In Korea used only for geodetic applications before being replaced by Korean 1985 (code 6162)."
      - name: "Tristan Astro 1968"
        definition: "A geodetic datum first defined in 1968 suitable for use in St Helena, Ascension and Tristan da Cunha - Tristan da Cunha island group including Tristan, Inaccessible, Nightingale, Middle and Stoltenhoff Islands. Tristan 1968 references the International 1924 ellipsoid and the Greenwich prime meridian. Tristan 1968 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Viti Levu 1916"
        definition: "A geodetic datum first defined in 1912 suitable for use in Fiji - Viti Levu island. Viti Levu 1912 references the Clarke 1880 (international foot) ellipsoid and the Greenwich prime meridian. Viti Levu 1912 Latitude origin was obtained astronomically at station Monavatu = 1753'28.285''S, longitude origin was obtained astronomically at station Suva = 17825'35.835''E. Viti Levu 1912 is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from Clifford J. Mugnier in Photogrammetric Engineering and Remote Sensing, October 2000, www.asprs.org. For topographic mapping, replaced by Fiji 1956. For other purposes, replaced by Fiji 1986."
      - name: "Wake-Eniwetok 1960"
        definition: "A geodetic datum first defined in 1960 suitable for use in Marshall Islands - onshore. Wake atoll onshore. Marshall Islands 1960 references the Hough 1960 ellipsoid and the Greenwich prime meridian. Marshall Islands 1960 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Wake Island Astro 1952"
        definition: "A geodetic datum first defined in 1952 suitable for use in Wake atoll - onshore. Wake Island 1952 references the International 1924 ellipsoid and the Greenwich prime meridian. Wake Island 1952 is a geodetic datum for Military and topographic mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Yacare"
        definition: "A geodetic datum suitable for use in Uruguay - onshore. Yacare references the International 1924 ellipsoid and the Greenwich prime meridian. Yacare origin is Fundamental point: Yacare. Latitude: 3035'53.68''S, longitude: 5725'01.30''W (of Greenwich). Yacare is a geodetic datum for Topographic mapping. It was defined by information from NIMA http://earth-info.nima.mil/"
      - name: "Zanderij"
        definition: "A geodetic datum suitable for use in Suriname - onshore and offshore. Zanderij references the International 1924 ellipsoid and the Greenwich prime meridian. Zanderij is a geodetic datum for Topographic mapping."
      - name: "American Samoa 1962"
        definition: "A geodetic datum first defined in 1962 suitable for use in American Samoa - Tutuila, Aunu'u, Ofu, Olesega and Ta'u islands. American Samoa 1962 references the Clarke 1866 ellipsoid and the Greenwich prime meridian. American Samoa 1962 origin is Fundamental point: Betty 13 eccentric. Latitude: 1420'08.34''S, longitude: 17042'52.25''W (of Greenwich). American Samoa 1962 is a geodetic datum for Topographic mapping. It was defined by information from NIMA TR8350.2 revision of January 2000. Oil industry sources for origin description details."
      - name: "Deception Island"
        definition: "A geodetic datum suitable for use in Antarctica - South Shetland Islands - Deception Island. Deception Island references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Deception Island is a geodetic datum for Military and scientific mapping. It was defined by information from DMA / NIMA / NGA TR8350.2 (3rd edition, Amendment 1, 3 January 2000)."
      - name: "Indian 1960"
        definition: "A geodetic datum suitable for use in Cambodia - onshore; Vietnam - onshore and offshore Cuu Long basin. Indian 1960 references the Everest 1830 (1937 Adjustment) ellipsoid and the Greenwich prime meridian. Indian 1960 origin is DMA extension over IndoChina of the Indian 1954 network adjusted to better fit local geoid. Indian 1960 is a geodetic datum for Topographic mapping. Also known as Indian (DMA Reduced)."
      - name: "Indonesian 1974"
        definition: "A geodetic datum first defined in 1974 suitable for use in Indonesia - onshore. Indonesian Datum 1974 references the Indonesian National Spheroid ellipsoid and the Greenwich prime meridian. Indonesian Datum 1974 origin is Fundamental point: Padang. Latitude: 056'38.414''S, longitude: 10022' 8.804''E (of Greenwich). Ellipsoidal height 3.190m, gravity-related height 14.0m above mean sea level. Indonesian Datum 1974 is a geodetic datum for Topographic mapping. It was defined by information from Bakosurtanal 1979 paper by Jacob Rais. Replaced by DGN95."
      - name: "North Sahara 1959"
        definition: "A geodetic datum first defined in 1959 suitable for use in Algeria - onshore and offshore. Nord Sahara 1959 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Nord Sahara 1959 origin is Coordinates of primary network readjusted on ED50 datum and then transformed conformally to Clarke 1880 (RGS) ellipsoid. Nord Sahara 1959 is a geodetic datum for Topographic mapping. It was defined by information from 'Le System Geodesique Nord-Sahara'; IGN Paris Adjustment includes Morocco and Tunisia but use only in Algeria. Within Algeria the adjustment is north of 32N but use has been extended southwards in many disconnected projects, some based on independent astro stations rather than the geodetic network."
      - name: "Pulkovo 1942"
        definition: |
          A geodetic datum first defined in 1942 suitable for use in Armenia; Azerbaijan; Belarus; Estonia - onshore; Georgia - onshore; Kazakhstan; Kyrgyzstan; Latvia - onshore; Lithuania - onshore; Moldova; Russian Federation - onshore; Tajikistan; Turkmenistan; Ukraine - onshore; Uzbekistan. Pulkovo 1942 references the Krassowsky 1940 ellipsoid and the Greenwich prime meridian. Pulkovo 1942 origin is Fundamental point: Pulkovo observatory. Latitude: 5946'18.550''N, longitude: 3019'42.090''E (of Greenwich). Pulkovo 1942 is a geodetic datum for Topographic mapping.
      - name: "S-JTSK"
        start: 116
        definition: "A geodetic datum suitable for use in Czech Republic; Slovakia. System Jednotne Trigonometricke Site Katastralni references the Bessel 1841 ellipsoid and the Greenwich prime meridian. System Jednotne Trigonometricke Site Katastralni origin is Modification of Austrian MGI datum, code 6312. System Jednotne Trigonometricke Site Katastralni is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from Research Institute for Geodesy Topography and Cartography (VUGTK); Prague. S-JTSK = System of the Unified Trigonometrical Cadastral Network."
      - name: "Voirol 1950"
        definition: "Voirol 1950 datum."
      - name: "Average Terrestrial System 1977"
        definition: "A geodetic datum first defined in 1977 suitable for use in Canada - New Brunswick; Nova Scotia; Prince Edward Island. Average Terrestrial System 1977 references the Average Terrestrial System 1977 ellipsoid and the Greenwich prime meridian. Average Terrestrial System 1977 is a geodetic datum for Topographic mapping. It was defined by information from New Brunswick Geographic Information Corporation land and water information standards manual. In use from 1979."
      - name: "Compensation Geodesique du Quebec 1977"
        definition: "Compensation Geodesique du Quebec 1977."
      - name: "Finnish (KKJ)"
        definition: "A geodetic datum first defined in 1966 suitable for use in Finland - onshore. Kartastokoordinaattijarjestelma (1966) references the International 1924 ellipsoid and the Greenwich prime meridian. Kartastokoordinaattijarjestelma (1966) origin is Adjustment with fundamental point SF31 based on ED50 transformed to best fit the older VVJ adjustment. Kartastokoordinaattijarjestelma (1966) is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from National Land Survey of Finland; http://www.maanmittauslaitos.fi. Adopted in 1970."
      - name: "Ordnance Survey of Ireland"
        definition: "A geodetic datum first defined in 1952 suitable for use in United Kingdom (UK) - Northern Ireland (Ulster) - onshore. OSNI 1952 references the Airy 1830 ellipsoid and the Greenwich prime meridian. OSNI 1952 origin is Position fixed to the coordinates from the 19th century Principle Triangulation of station Divis. Scale and orientation controlled by position of Principle Triangulation stations Knocklayd and Trostan. OSNI 1952 is a geodetic datum for Geodetic survey and topographic mapping. It was defined by information from Ordnance Survey of Northern Ireland. Replaced by Geodetic Datum of 1965 alias 1975 Mapping Adjustment or TM75 (datum code 6300)."
      - name: "Revised Kertau"
        definition: "A geodetic datum first defined in 1969 suitable for use in Malaysia - West Malaysia; Singapore. Kertau (RSO) references the Everest 1830 (RSO 1969) ellipsoid and the Greenwich prime meridian. Kertau (RSO) is a geodetic datum for Metrication of RSO grid. It was defined by information from Defence Geographic Centre. Adopts metric conversion of 0.914398 metres per yard exactly. This is a truncation of the Sears 1922 ratio."
      - name: "Revised Nahrwan"
        definition: "A geodetic datum first defined in 1967 suitable for use in Arabian Gulf; Qatar - offshore; United Arab Emirates (UAE) - Abu Dhabi; Dubai; Sharjah; Ajman; Fujairah; Ras Al Kaimah; Umm Al Qaiwain - onshore and offshore. Nahrwan 1967 references the Clarke 1880 (RGS) ellipsoid and the Greenwich prime meridian. Nahrwan 1967 origin is Fundamental point: Nahrwan south base. Latitude: 3319'10.87''N, longitude: 4443'25.54''E (of Greenwich). Nahrwan 1967 is a geodetic datum for Topographic mapping. In Iraq, replaces Nahrwan 1934."
      - name: "GGRS 76 (Greece)"
        definition: "A geodetic datum first defined in 1987 suitable for use in Greece - onshore. Greek Geodetic Reference System 1987 references the GRS 1980 ellipsoid and the Greenwich prime meridian. Greek Geodetic Reference System 1987 origin is Fundamental point: Dionysos. Latitude 3804'33.8''N, longitude 2355'51.0''E of Greenwich; geoid height 7.0 m. Greek Geodetic Reference System 1987 is a geodetic datum for Topographic mapping. It was defined by information from L. Portokalakis; Public Petroleum Corporation of Greece. Replaced (old) Greek datum. Oil industry work based on ED50."
      - name: "Nouvelle Triangulation de France"
        definition: "A geodetic datum first defined in 1895 suitable for use in France - onshore - mainland and Corsica. Nouvelle Triangulation Francaise references the Clarke 1880 (IGN) ellipsoid and the Greenwich prime meridian. Nouvelle Triangulation Francaise origin is Fundamental point: Pantheon. Latitude: 4850'46.522''N, longitude: 220'48.667''E (of Greenwich). Nouvelle Triangulation Francaise is a geodetic datum for Topographic mapping."
      - name: "RT 90 (Sweden)"
        definition: "A geodetic datum first defined in 1982 suitable for use in Sweden - onshore and offshore. Rikets koordinatsystem 1990 references the Bessel 1841 ellipsoid and the Greenwich prime meridian. Rikets koordinatsystem 1990 is a geodetic datum for Geodetic survey, cadastre, topographic mapping, engineering survey. It was defined by information from National Land Survey of Sweden Replaces RT38 adjustment (datum code 6308)."
      - name: "Geocentric Datum of Australia"
        definition: "A geodetic datum first defined in 1994 suitable for use in Australia including Lord Howe Island, Macquarie Islands, Ashmore and Cartier Islands, Christmas Island, Cocos (Keeling) Islands, Norfolk Island. All onshore and offshore. Geocentric Datum of Australia 1994 references the GRS 1980 ellipsoid and the Greenwich prime meridian. Geocentric Datum of Australia 1994 origin is ITRF92 at epoch 1994.0. Geocentric Datum of Australia 1994 is a geodetic datum for Topographic mapping, geodetic survey. It was defined by information from Australian Surveying and Land Information Group Internet WWW page. http://www.auslig.gov.au/geodesy/datums/gda.htm#specs Coincident with WGS84 to within 1 metre."
      - name: "BJZ54 (A954 Beijing Coordinates)"
        definition: "A geodetic datum first defined in 1954 suitable for use in China - onshore. Beijing 1954 references the Krassowsky 1940 ellipsoid and the Greenwich prime meridian. Beijing 1954 origin is Pulkovo, transferred through Russian triangulation. Beijing 1954 is a geodetic datum for Topographic mapping. It was defined by information from Chinese Science Bulletin, 2009, 54:2714-2721 Scale determined through three baselines in northeast China. Discontinuities at boundaries of adjustment blocks. From 1982 replaced by Xian 1980 and New Beijing."
      - name: "Modified BJZ54"
        definition: "Modified BJZ54 datum."
      - name: "GDZ80"
        definition: "GDZ80 datum."
      - name: "Local Datum"
        definition: "An arbitrary datum defined by a local harbour authority, from which levels and tidal heights are measured by this authority."
    remarks: "All necessary information for conversion of geographic coordinates from most of the Geodetic Datums in the above list to WGS-84 is contained in the 'User's Handbook on Datum Transformations involving WGS-84', prepared by the US Defense Mapping Agency and which is available from the IHB as IHO Publication S-60 (English and French Versions), along with an associated standard datum transformation software on floppy disk called 'MADTRAN'."

  - title: "Reference Point"
    definition: "-"
    remarks: ""

  - title: "Signal Status"
    definition: "The indication of an element of a signal sequence being a period of light/sound or eclipse/silence."
    sub_definitions:
      - name: "Lit/Sound"
        definition: "The indication of an element of a signal sequence being a period of light or sound."
      - name: "Eclipsed/Silent"
        definition: "The indication of an element of a signal sequence being a period of eclipse or silence."
    remarks: "No remarks."

  - title: "Signal Duration"
    definition: "The time occupied by a single instance of light/sound or eclipse/silence in a signal sequence."
    remarks: "No remarks."

  - title: "Sector Line Length"
    definition: "A sector is the part of a circle between two straight lines drawn from the centre to the circumference. Sector line length specifies the displayed length of the line, in ground units, defining the limit of the sector."
    remarks: "No remarks."

  - title: "Sector Bearing"
    definition: "A sector is the part of a circle between two straight lines drawn from the centre to the circumference. Sector bearing specifies the limit of the sector."
    remarks: "The values given to the common limits of adjacent sectors should be identical. The orientation of bearing is from seaward to the central object. This conforms with the method used in 'List of Lights' publications. A generic term such as 'to shore' cannot be used; a specific bearing must be encoded. Where a light sector limit is defined as 'to the shore', it should be encoded using a value that ensures that, when the limit is drawn, it will fall entirely on land."

  - title: "Wave Length Value"
    definition: "The distance between two successive peaks (or other points of identical phase) on an electromagnetic wave."
    remarks: "No remarks."

  - title: "Radar Band"
    definition: "The band code character of the electromagnetic spectrum within which radar wave lengths lie."
    remarks: "No remarks."

  - title: "Number of Features"
    definition: "The number of features of identical character that exist as a co-located group."
    remarks: "No remarks."

  - title: "Multiplicity Known"
    definition: "The number of features of identical character that exist as a co-located group is or is not known."
    remarks: "No remarks."

  - title: "Sector Extension"
    definition: "Distance in screen millimetres (mm) by which a sector arc is extended beyond the default."
    remarks: "The sector extension is calculated by ENC production software systems."

  - title: "Moire Effect"
    definition: "A short range (up to 2km) type of directional light. Sodium lighting gives a yellow background to a screen on which a vertical black line will be seen by an observer on the centre line."
    remarks: "No remarks."

  - title: "Category of Cable"
    definition: "Classification of the cable based on the services provided."
    sub_definitions:
      - name: "Power Line"
        definition: "A cable that transmits or distributes electrical power."
      - name: "Transmission Line"
        start: 3
        definition: "Multiple un-insulated cables usually supported by steel lattice towers. Such features are generally more prominent than normal power lines."
      - name: "Telephone"
        definition: "A cable that transmits telephone signals."
      - name: "Telegraph"
        definition: "An apparatus, system or process for communication at a distance by electric transmission over wire."
      - name: "Mooring Cable"
        definition: "A chain or very strong fibre or wire rope used to anchor or moor vessels or buoys."
      - name: "Ferry"
        definition: "A vessel for transporting passengers, vehicles, and/or goods across a stretch of water, especially as a regular service."
      - name: "Fibre Optic Cable"
        definition: "A cable made of glass or plastic fiber designed to guide light along its length, fibre optic cables are widely used in fiber-optic communication, which permits transmission over longer distances and at higher data rates than other forms of communication."
    remarks: "No remarks."

  - title: "Shackle Type"
    definition: "Types of shackle."
    sub_definitions:
      - name: "forelock shackles"
        definition: "-"
      - name: "clenching shackles"
        definition: "-"
      - name: "bolt shackles"
        definition: "-"
      - name: "screw pin shackles"
        definition: "-"
      - name: "kenter shackle"
        definition: "-"
      - name: "quick release link"
        definition: "-"
    remarks: ""

  - title: "Category of Pile"
    definition: "Classification of pile, driven into the earth as a foundation or support for a structure."
    sub_definitions:
      - name: "Stake"
        definition: "An elongated wood or metal pole embedded in the seabed to serve as a marker or support."
      - name: "Post"
        start: 3
        definition: "A vertical piece of timber, metal or concrete forced into the earth or sea bed."
      - name: "Tripodal"
        definition: "A single structure comprising 3 or more piles held together (sections of heavy timber, steel or concrete), and forced into the earth or sea bed."
      - name: "Piling"
        definition: "A number of piles, usually in a straight line, and usually connected or bolted together."
      - name: "Area of Piles"
        definition: "A number of piles, usually in a straight line, but not connected by structural members."
      - name: "Pipe"
        definition: "A vertical hollow cylinder of metal, wood, or other material forced into the earth or seabed."
    remarks: "No remarks."

  - title: "Category of Silo/Tank"
    definition: "Classification based on the product for which a silo or tank is used."
    sub_definitions:
      - name: "Silo in General"
        definition: "A large storage structure used for storing loose materials."
      - name: "Tank in General"
        definition: "A fixed structure for storing liquids."
      - name: "Grain Elevator"
        definition: "A storage building for grain. Usually a tall frame, metal or concrete structure with an especially compartmented interior."
      - name: "Water Tower"
        definition: "A tower supporting an elevated storage tank of water."
    remarks: "No remarks."

  - title: "Building Shape"
    definition: "The specific shape of the building."
    sub_definitions:
      - name: "High-Rise Building"
        start: 5
        definition: "A building having many storeys."
      - name: "Pyramid"
        definition: "A polyhedron of which one face is a polygon of any number of sides, and the other faces are triangles with a common vertex."
      - name: "Cylindrical"
        definition: "Shaped like a cylinder, which is a solid geometrical figure generated by straight lines fixed in direction and describing with one of its points a closed curve, especially a circle."
      - name: "Spherical"
        definition: "Shaped like a sphere, which is a body the surface of which is at all points equidistant from the centre."
      - name: "Cubic"
        definition: "A shape the sides of which are six equal squares; a regular hexahedron."
    remarks: "No remarks."

  - title: "Product"
    definition: "The various substances which are transported, stored or exploited."
    sub_definitions:
      - name: "Oil"
        definition: "A thick, slippery liquid that will not dissolve in water, usually petroleum based in the context of storage tanks."
      - name: "Gas"
        definition: "A substance with particles that can move freely, usually a fuel substance in the context of storage tanks."
      - name: "Water"
        definition: "A colourless, odourless, tasteless liquid that is a compound of hydrogen and oxygen."
      - name: "Stone"
        definition: "A general term for rock and rock fragments ranging in size from pebbles and gravel to boulders or large rock masses."
      - name: "Coal"
        definition: "A hard black mineral that is burned as fuel."
      - name: "Ore"
        definition: "A solid rock or mineral from which metal is obtained."
      - name: "Chemicals"
        definition: "Any substance obtained by or used in a chemical process."
      - name: "Drinking Water"
        definition: "Water that is suitable for human consumption."
      - name: "Milk"
        definition: "A white fluid secreted by female mammals as food for their young."
      - name: "Bauxite"
        definition: "A mineral from which aluminum is obtained."
      - name: "Coke"
        definition: "A solid substance obtained after gas and tar have been extracted from coal, used as a fuel."
      - name: "Iron Ingots"
        definition: "An oblong lump of cast iron metal."
      - name: "Salt"
        definition: "Sodium chloride obtained from mines or by the evaporation of sea water."
      - name: "Sand"
        definition: "Loose material consisting of small but easily distinguishable, separate grains, between 0.0625 and 2.000 millimetres in diameter."
      - name: "Timber"
        definition: "Wood prepared for use in building or carpentry."
      - name: "Sawdust/Wood Chips"
        definition: "Powdery fragments of wood made in sawing timber or coarse chips produced for use in manufacturing pressed board."
      - name: "Scrap Metal"
        definition: "Discarded metal suitable for being reprocessed."
      - name: "Liquefied Natural Gas"
        definition: "Natural gas that has been liquefied for ease of transport by cooling the gas to -162 Celsius."
      - name: "Liquefied Petroleum Gas"
        definition: "A compressed gas consisting of flammable light hydrocarbons and derived from petroleum."
      - name: "Wine"
        definition: "The fermented juice of grapes."
      - name: "Cement"
        definition: "A substance made of powdered lime and clay, mixed with water."
      - name: "Grain"
        definition: "A small hard seed, especially that of any cereal plant such as wheat, rice, corn, rye etc."
      - name: "Electricity"
        definition: "Electric charge or current."
      - name: "Ice"
        definition: "The solid form of water."
      - name: "Clay"
        definition: "(Particles of less than 0.002mm); stiff, sticky earth that becomes hard when baked."
    remarks: "No remarks."

  - title: "Category of Offshore Platform"
    definition: "Classification of an offshore raised structure."
    sub_definitions:
      - name: "Oil Rig"
        definition: "A temporary mobile structure, either fixed or floating, used in the exploration stages of oil and gas fields."
      - name: "Production Platform"
        definition: "A term used to indicate a permanent offshore structure equipped to control the flow of oil or gas. It does not include entirely submarine structures."
      - name: "Observation/Research Platform"
        definition: "A platform from which one's surroundings or events can be observed, noted or recorded such as for scientific study."
      - name: "Articulated Loading Platform"
        definition: "A metal lattice tower, buoyant at one end and attached at the other by a universal joint to a concrete filled base on the sea bed. The platform may be fitted with a helicopter platform, emergency accommodation and hawser/hose retrieval."
      - name: "Single Anchor Leg Mooring"
        definition: "A rigid frame or tube with a buoyancy device at its upper end , secured at its lower end to a universal joint on a large steel or concrete base resting on the sea bed, and at its upper end to a mooring buoy by a chain or wire."
      - name: "Mooring Tower"
        definition: "A platform secured to the sea bed and surmounted by a turntable to which ships moor."
      - name: "Artificial Island"
        definition: "A man-made structure usually built for the exploration or exploitation of marine resources, marine scientific research, tidal observations, etc."
      - name: "Floating Production, Storage and Off-Loading Vessel"
        definition: "An offshore oil/gas facility consisting of a moored tanker/barge by which the product is extracted, stored and exported."
      - name: "Accommodation Platform"
        definition: "A platform used primarily for eating, sleeping and recreation purposes."
      - name: "Navigation, Communication and Control Buoy"
        definition: "A floating structure with control room, power and storage facilities, attached to the sea bed by a flexible pipeline and cables."
      - name: "Floating Oil Tank"
        definition: "A floating structure, anchored to the seabed, for storing oil."
    remarks: "No remarks."

  - title: "Horizontal Width"
    definition: "A measurement of the shorter of two linear axis."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Horizontal Length"
    definition: "A measurement of the longer of two linear axis."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Category of Cardinal Mark"
    definition: "The four quadrants (north, east, south and west) are bounded by the true bearings NW-NE, NE-SE, SE-SW and SW-NW taken from the point of interest. A cardinal mark is named after the quadrant in which it is placed. The name of the cardinal mark indicates that it should be passed to the named side of the mark."
    sub_definitions:
      - name: "North Cardinal Mark"
        definition: "Quadrant bounded by the true bearing NW-NE taken from the point of interest; it should be passed to the north side of the mark."
      - name: "East Cardinal Mark"
        definition: "Quadrant bounded by the true bearing NE-SE taken from the point of interest. It should be passed to the east side of the mark."
      - name: "South Cardinal Mark"
        definition: "Quadrant bounded by the true bearing SE-SW taken from the point of interest; it should be passed to the south side of the mark."
      - name: "West Cardinal Mark"
        definition: "Quadrant bounded by the true bearing SW-NW taken from the point of interest; it should be passed to the west side of the mark."
    remarks: "Cardinal marks are used in conjunction with the compass to indicate where a mariner will find safe navigable water. Cardinal marks do not have a distinctive shape but are normally pillar or spar. They are always painted in yellow and black horizontal bands and their distinctive double cone top-marks are always black. (Note that such top-marks are encoded as separate TOPMAR objects). Cardinal marks may also have a special system of flashing white lights and if such lights are fitted they are encoded as separate LIGHTS objects."

  - title: "Type of Light"
    definition: "Type of light equipment."
    sub_definitions: []
    remarks: "For example bulb type (250mm, 300mm, 400mm), LED type (integral type, 200, 200HI, 250, 300, 350)."

  - title: "NMEAString"
    definition: "NMEA string captured from the positioning device.(proposed by CCG)"
    sub_definitions: []
    remarks: ""

  - title: "Light Characteristic"
    definition: "The distinct character, such as *fixed*, *flashing*, or *occulting*, which is given to each light to avoid confusion with neighbouring ones."
    sub_definitions:
      - name: "Fixed"
        definition: "A signal light that shows continuously, in any given direction, with constant luminous intensity and colour."
      - name: "Flashing"
        definition: "A rhythmic light in which the total duration of light in a period is clearly shorter than the total duration of darkness and all the appearances of light are of equal duration."
      - name: "Long-Flashing"
        definition: "A single-flashing light in which a single flash of not less than two seconds duration is regularly repeated."
      - name: "Quick-Flashing"
        definition: |
          A rhythmic light in which flashes are repeated at a rate of not less than 50 flashes per minutes but less than 80 flashes per minutes. It may be:
          
          * Continuous quick-flashing: A quick-flashing light in which a flash is regularly repeated.
          * Group quick-flashing: A quick-flashing light in which a group of two or more flashes, which are specified in number, is regularly repeated.
      - name: "Very Quick-Flashing"
        definition: |
          A rhythmic light in which flashes are repeated at a rate of not less than 80 flashes per minute but less than 160 flashes per minute. It may be:
          
          * Continuous very quick-flashing: A very quick-flashing light in which a flash is regularly repeated.
          * Group very quick-flashing: A very quick-flashing light in which a group of two or more flashes, which are specified in number, is regularly repeated.
      - name: "Continuous Ultra Quick-Flashing"
        definition: "A rhythmic light in which flashes are regularly repeated at a rate of not less than 160 flashes per minute."
      - name: "Isophased"
        definition: "A light with all durations of light and darkness equal."
      - name: "Occulting"
        definition: |
          A rhythmic light in which the total duration of light in a period is clearly longer than the total duration of darkness and all the eclipses are of equal duration. It may be:
          
          * Single-occulting: An occulting light in which an eclipse is regularly repeated.
          * Group-occulting: An occulting light in which a group of two or more eclipses, which are specified in number, is regularly repeated.
          * Composite group-occulting: An occulting light in which a sequence of groups of one or more eclipses, which are specified in number, is regularly repeated, and the groups comprise different numbers of eclipses.
          * Composite group-occulting: An occulting light in which a sequence of groups of one or more eclipses, which are specified in number, is regularly repeated, and the groups comprise different numbers of eclipses.
      - name: "Interrupted Quick Flashing"
        definition: "A quick light in which the sequence of flashes is interrupted by regularly repeated eclipses of constant and long duration."
      - name: "Interrupted Very Quick Flashing"
        definition: "A light in which the very rapid alterations of light and darkness are interrupted at regular intervals by eclipses of long duration."
      - name: "Interrupted Ultra Quick-Flashing"
        definition: "A light in which the ultra quick flashes (160 or more per minute) are interrupted at regular intervals by eclipses of long duration."
      - name: "Morse"
        definition: "A rhythmic light in which appearances of light of two clearly different durations are grouped to represent a character or characters in the Morse code."
      - name: "Fixed and Flash"
        definition: "A rhythmic light in which a fixed light is combined with a flashing light of higher luminous intensity."
      - name: "Flash and Long-Flash"
        definition: "A rhythmic light in which a flashing light is combined with a long-flashing light of higher luminous intensity."
      - name: "Occulting and Flash"
        definition: "A rhythmic light in which an occulting light is combined with a flashing light of higher luminous intensity."
      - name: "Fixed and Long-Flash"
        definition: "A rhythmic light in which a fixed light is combined with a long-flashing light of higher luminous intensity."
      - name: "Occulting Alternating"
        definition: "An alternating light in which the total duration of light in each period is clearly longer than the total duration of darkness and in which the intervals of darkness (occultations) are all of equal duration."
      - name: "Long-Flash Alternating"
        definition: "An alternating single-flashing light in which an appearance of light of not less than two seconds duration is regularly repeated."
      - name: "Flash Alternating"
        definition: "An alternating rhythmic light in which the total duration of light in a period is clearly shorter than the total duration of darkness and all the appearances of light are of equal duration."
      - name: "Group Alternating"
        definition: "Occulting light in which the occultations are combined in groups, each group including the same number of occultations, and in which the groups are repeated at regular intervals."
      - name: "Quick-Flash Plus Long-Flash"
        start: 25
        definition: "A rhythmic light in which a group of quick flashes is followed by one or more long flashes in a regularly repeated sequence with a regular periodicity."
      - name: "Very Quick-Flash Plus Long-Flash"
        definition: "A rhythmic light in which a group of very quick flashes is followed by one or more long flashes in a regularly repeated sequence with a regular periodicity."
      - name: "Ultra Quick-Flash Plus Long-Flash"
        definition: "A rhythmic light in which a group of ultra quick flashes is followed by one or more long flashes in a regularly repeated sequence with a regular periodicity."
      - name: "Alternating"
        definition: "A signal light that shows, in any given direction, two or more colours in a regularly repeated sequence with a regular periodicity."
      - name: "Fixed and Alternating Flashing"
        definition: "A rhythmic light in which a fixed light is combined with a flashing light of higher luminous intensity and different colour."
    remarks: "No remarks."

  - title: "Category Of Power Source"
    definition: ""
    sub_definitions:
      - name: "battery"
        definition: ""
      - name: "generator"
        definition: ""
      - name: "solar panel"
        definition: ""
      - name: "electrical service"
        definition: ""
    remarks: ""

  - title: "Category Of Synthetic AIS Aid To Navigation"
    definition: ""
    sub_definitions:
      - name: "predicted"
        definition: ""
      - name: "monitored"
        definition: ""
    remarks: ""

  - title: "Category Of Physical AIS Aid To Navigation"
    definition: ""
    sub_definitions:
      - name: "Physical AIS Type 1"
        definition: ""
      - name: "Physical AIS Type 2"
        definition: ""
      - name: "Physical AIS Type 3"
        definition: ""
    remarks: ""

  - title: "Virtual AIS Aid to Navigation Type"
    definition: "A purpose of a virtual AIS Aid to Navigation."
    sub_definitions:
      - name: "North Cardinal"
        definition: "Indicates that it should be passed to the north side of the aid."
      - name: "East Cardinal"
        definition: "Indicates that it should be passed to the east side of the aid."
      - name: "South Cardinal"
        definition: "Indicates that it should be passed to the south side of the aid."
      - name: "West Cardinal"
        definition: "Indicates that it should be passed to the west side of the aid."
      - name: "Port Lateral"
        definition: "Indicates the port boundary of a navigational channel or suggested route when proceeding in the conventional direction of buoyage."
      - name: "Starboard Lateral"
        definition: "Indicates the starboard boundary of a navigational channel or suggested route when proceeding in the conventional direction of buoyage."
      - name: "Preferred Channel to Port"
        definition: "At a point where a channel divides, when proceeding in the conventional direction of buoyage, the preferred channel (or primary route) is indicated by a modified port-hand lateral mark."
      - name: "Preferred Channel to Starboard"
        definition: "At a point where a channel divides, when proceeding in the conventional direction of buoyage, the preferred channel (or primary route) is indicated by a modified starboard-hand lateral mark."
      - name: "Isolated Danger"
        definition: "A mark used alone to indicate a dangerous reef or shoal. The mark may be passed on either hand."
      - name: "Safe Water"
        definition: "Indicates that there is navigable water around the mark."
      - name: "Special Purpose"
        definition: "A special purpose aid is primarily used to indicate an area or feature, the nature of which is apparent from reference to a chart, Sailing Directions or Notice to Mariners."
      - name: "New Danger Marking"
        definition: "A mark used to indicate the existence of a recently identified new danger, such as a wreck."
    remarks: "No remarks."

  - title: "MMSI Code"
    definition: "The Maritime Mobile Service Identity (MMSI) Code is formed of a series of nine digits which are transmitted over the radio path in order to uniquely identify ship stations, ship earth stations, coast stations, coast earth stations, and group calls. These identities are formed in such a way that the identity or part thereof can be used by telephone and telex subscribers connected to the general telecommunications network principally to call ships automatically."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Category of Radar Transponder Beacon"
    definition: "Classification of radar transponder beacon based on functionality."
    sub_definitions:
      - name: "Ramark, Radar Beacon Transmitting Continuously"
        definition: "A radar marker beacon which continuously transmits a signal appearing as a radial line on a radar screen, the line indicating the direction of the beacon. Ramarks are intended primarily for marine use. The name 'ramark' is derived from the words radar marker."
      - name: "Racon, Radar Transponder Beacon"
        definition: "A radar beacon which returns a coded signal which provides identification of the beacon, as well as range and bearing. The range and bearing are indicated by the location of the first character received on the radar screen. The name 'racon' is derived from the words radar beacon."
      - name: "Leading Racon/Radar Transponder Beacon"
        definition: "A radar beacon that may be used (in conjunction with at least one other radar beacon) to indicate a leading line."
    remarks: "No remarks."

  - title: "Topmark/Daymark Shape"
    definition: "The shape a topmark or daymark exhibits."
    sub_definitions:
      - name: "Cone (Point Up)"
        definition: "Is where the vertex points up. A cone is a solid figure generated by straight lines drawn from a fixed point (the vertex) to a circle in a plane not containing the vertex. Cones are commonly used as International Association of Lighthouse Authorities - IALA topmarks, lateral."
      - name: "Cone (Point Down)"
        definition: "Is where the vertex points down. A cone is a solid figure generated by straight lines drawn from a fixed point (the vertex) to a circle in a plane not containing the vertex. Cones are commonly used as International Association of Lighthouse Authorities - IALA topmarks, lateral."
      - name: "Sphere"
        definition: "A curved surface all points of which are equidistant from a fixed point within, called the centre."
      - name: "2 Spheres"
        definition: "Two spheres, one above the other. Two black spheres are commonly used as an International Association of Lighthouse Authorities - IALA topmark (isolated danger)."
      - name: "Cylinder"
        definition: "A solid geometrical figure generated by straight lines fixed in direction and describing with one of point a closed curve, especially a circle (in which case the figure is circular cylinder, it's ends being parallel circles). Cylinders are commonly used as International Association of Lighthouse Authorities - IALA topmarks lateral."
      - name: "Board"
        definition: "Usually of rectangular shape, made from timber or metal and used to provide a contrast with the natural background of a daymark. The actual daymark is often painted on to this board."
      - name: "X-Shaped"
        definition: "Having a shape or a cross-section like the capital letter X. An x-shape as an International Association of Lighthouse Authorities - IALA topmark should be 3 dimensional in shape. It is made of at least three crossed bars."
      - name: "Upright Cross"
        definition: "A cross with one vertical member and one horizontal member; that is, similar in shape to the character '+'."
      - name: "Cube (Point Up)"
        definition: "A cube standing on one of its vertexes. A cube is a solid contained by six equal squares, a regular hexahedron."
      - name: "2 Cones (Point to Point)"
        definition: "2 cones, one above the other, with their vertices together in the centre."
      - name: "2 Cones (Base to Base)"
        definition: "2 cones, one above the other, with their bases together in the centre and their vertices pointing up and down."
      - name: "Rhombus"
        definition: "A plane figure having four equal sides and equal opposite angles (two acute and two obtuse); an oblique equilateral parallelogram."
      - name: "2 Cones (Points Upward)"
        definition: "2 cones, one above the other, with their vertices pointing up."
      - name: "2 Cones (Points Downward)"
        definition: "2 cones, one above the other, with their vertices pointing down."
      - name: "Besom (Point Up)"
        definition: "Besom: A bundle of rods or twigs. Perch: A staff placed on top of a buoy, rock or shoal as a mark for navigation. A besom, point up is where the thicker (untied) end of the besom is at the bottom."
      - name: "Besom (Point Down)"
        definition: "Besom: A bundle of rods or twigs. Perch: A staff placed on top of a buoy, rock or shoal as a mark for navigation. A besom, point down is where the thinner (tied) end of the besom is at the bottom."
      - name: "Flag"
        definition: "A flag mounted on a short pole."
      - name: "Sphere Over a Rhombus"
        definition: "A sphere located above a rhombus."
      - name: "Square"
        definition: "A plane figure with four right angles and four equal straight sides."
      - name: "Rectangle (Horizontal)"
        definition: "Where the two longer opposite sides are standing horizontally. A rectangle is a plane figure with four right angles and four straight sides, opposite sides being parallel and equal in length."
      - name: "Rectangle (Vertical)"
        definition: "Where the two longer opposite sides are standing vertically. A rectangle is a plane figure with four right angles and four straight sides, opposite sides being parallel and equal in length."
      - name: "Trapezium (Up)"
        definition: "A quadrilateral having one pair of opposite sides parallel, and which stands on its longer parallel side."
      - name: "Trapezium (Down)"
        definition: "A quadrilateral having one pair of opposite sides parallel, and which stands on its shorter parallel side."
      - name: "Triangle (Point Up)"
        definition: "A figure having three angles and three sides, and which has a vertex at the top."
      - name: "Triangle (Point Down)"
        definition: "A figure having three angles and three sides, and which has a side at the top."
      - name: "Circle"
        definition: "A perfectly round plane figure whose circumference is everywhere equidistant from its centre."
      - name: "Two Upright Crosses (One Over the Other)"
        definition: "Two upright crosses, generally vertically disposed one above the other."
      - name: "T-Shape"
        definition: "Having a shape like the capital letter T."
      - name: "Triangle Pointing Up Over a Circle"
        definition: "A triangle, vertex uppermost, located above a circle."
      - name: "Upright Cross Over a Circle"
        definition: "An upright cross located above a circle."
      - name: "Rhombus Over a Circle"
        definition: "A rhombus located above a circle."
      - name: "Circle Over a Triangle Pointing Up"
        definition: "A circle located over a triangle, vertex uppermost."
      - name: "Other Shape (See Shape Information)"
        definition: "An uncommon and/or non-standardized shape as textually described using an associated attribute."
      - name: "Tubular"
        definition: "Having the form of or consisting of a tube."
    remarks: "No remarks."

  - title: "Orientation Value"
    definition: "The angular distance measured from true north to the major axis of the feature."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Category of Special Purpose Mark"
    definition: "Classification of an aid to navigation which signifies some special purpose."
    sub_definitions:
      - name: "Firing Danger Mark"
        definition: "A mark used to indicate a firing danger area, usually at sea."
      - name: "Target Mark"
        definition: "Any object toward which something is directed. The distinctive marking or instrumentation of a ground point to aid its identification on a photograph."
      - name: "Marker Ship Mark"
        definition: "A mark marking the position of a ship which is used as a target during some military exercise."
      - name: "Degaussing Range Mark"
        definition: "A mark used to indicate a degaussing range."
      - name: "Barge Mark"
        definition: "A mark of relevance to barges."
      - name: "Cable Mark"
        definition: "A mark used to indicate the position of submarine cables or the point at which they run on to the land."
      - name: "Spoil Ground Mark"
        definition: "A mark used to indicate the limit of a spoil ground."
      - name: "Outfall Mark"
        definition: "A mark used to indicate the position of an outfall or the point at which it leaves the land."
      - name: "ODAS"
        definition: "Ocean Data Acquisition System."
      - name: "Recording Mark"
        definition: "A mark used to record data for scientific purposes."
      - name: "Seaplane Anchorage Mark"
        definition: "A mark used to indicate a seaplane anchorage."
      - name: "Recreation Zone Mark"
        definition: "A mark used to indicate a recreation zone."
      - name: "Private Mark"
        definition: "A privately maintained mark."
      - name: "Mooring Mark"
        definition: "A mark indicating a mooring or moorings."
      - name: "LANBY"
        definition: "A large buoy designed to take the place of a lightship where construction of an offshore light station is not feasible."
      - name: "Leading Mark"
        definition: "Aids to navigation or other indicators so located as to indicate the path to be followed. Leading marks identify a leading line when they are in transit."
      - name: "Measured Distance Mark"
        definition: "A mark forming part of a transit indicating one end of a measured distance."
      - name: "Notice Mark"
        definition: "A notice board or sign indicating information to the mariner."
      - name: "TSS Mark"
        definition: "A mark indicating a Traffic Separation Scheme."
      - name: "Anchoring Prohibited Mark"
        definition: "A mark indicating an anchoring prohibited area."
      - name: "Berthing Prohibited Mark"
        definition: "A mark indicating that berthing is prohibited."
      - name: "Overtaking Prohibited Mark"
        definition: "A mark indicating that overtaking is prohibited."
      - name: "Two-Way Traffic Prohibited Mark"
        definition: "A mark indicating a one-way route."
      - name: "Reduced Wake Mark"
        definition: "A mark indicating that vessels must not generate excessive wake."
      - name: "Speed Limit Mark"
        definition: "A mark indicating that a speed limit applies."
      - name: "Stop Mark"
        definition: "A mark indicating the place where the bow of a ship must stop when traffic lights show red."
      - name: "General Warning Mark"
        definition: "A mark indicating that special caution must be exercised in the vicinity of the mark."
      - name: "Sound Ship's Siren Mark"
        definition: "A mark indicating that a ship should sound its siren or horn."
      - name: "Restricted Vertical Clearance Mark"
        definition: "A mark indicating the minimum vertical space available for passage."
      - name: "Maximum Vessel's Draught Mark"
        definition: "A mark indicating the maximum draught of vessel permitted."
      - name: "Restricted Horizontal Clearance Mark"
        definition: "A mark indicating the minimum horizontal space available for passage."
      - name: "Strong Current Warning Mark"
        definition: "A mark warning of strong currents."
      - name: "Berthing Permitted Mark"
        definition: "A mark indicating that berthing is allowed."
      - name: "Overhead Power Cable Mark"
        definition: "A mark indicating an overhead power cable."
      - name: "Channel Edge Gradient Mark"
        definition: "A mark indicating the gradient of the slope of a dredge channel edge."
      - name: "Telephone Mark"
        definition: "A mark indicating the presence of a telephone."
      - name: "Ferry Crossing Mark"
        definition: "A mark indicating that a ferry route crosses the ship route; often used with a 'sound ship's siren' mark."
      - name: "Pipeline Mark"
        start: 39
        definition: "A mark used to indicate the position of submarine pipelines or the point at which they run on to the land."
      - name: "Anchorage Mark"
        definition: "A mark indicating an anchorage area."
      - name: "Clearing Mark"
        definition: "A mark used to indicate a clearing line."
      - name: "Control Mark"
        definition: "A mark indicating the location at which a restriction or requirement exists."
      - name: "Diving Mark"
        definition: "A mark indicating that diving may take place in the vicinity."
      - name: "Refuge Beacon"
        definition: "A mark providing or indicating a place of safety."
      - name: "Foul Ground Mark"
        definition: "A mark indicating a foul ground."
      - name: "Yachting Mark"
        definition: "A mark installed for use by yachtsmen."
      - name: "Heliport Mark"
        definition: "A mark indicating an area where helicopters may land."
      - name: "GNSS Mark"
        definition: "A mark indicating a location at which a GNSS position has been accurately determined."
      - name: "Seaplane Landing Mark"
        definition: "A mark indicating an area where sea-planes land."
      - name: "Entry Prohibited Mark"
        definition: "A mark indicating that entry is prohibited."
      - name: "Work in Progress Mark"
        definition: "A mark indicating that work (generally construction) is in progress."
      - name: "Mark With Unknown Purpose"
        definition: "A mark whose detailed characteristics are unknown."
      - name: "Wellhead Mark"
        definition: "A mark indicating a borehole that produces or is capable of producing oil or natural gas."
      - name: "Channel Separation Mark"
        definition: "A mark indicating the point at which a channel divides separately into two channels."
      - name: "Marine Farm Mark"
        definition: "A mark indicating the existence of a fish, mussel, oyster or pearl farm/culture."
      - name: "Artificial Reef Mark"
        definition: "A mark indicating the existence or the extent of an artificial reef."
      - name: "Ice Mark"
        definition: "A mark, used year round, that may be submerged when ice passes through the area."
      - name: "Nature Reserve Mark"
        definition: "A mark used to define the boundary of a nature reserve."
      - name: "Fish Aggregating Device"
        definition: "A fish aggregating (or aggregation) device (FAD) is a man-made object used to attract ocean going pelagic fish such as marlin, tuna and mahi-mahi (dolphin fish). They usually consist of buoys or floats tethered to the ocean floor with concrete blocks."
      - name: "Wreck Mark"
        definition: "A mark used to indicate the existence of a wreck."
      - name: "Customs Mark"
        definition: "A mark used to indicate the existence of a customs checkpoint."
      - name: "Causeway Mark"
        definition: "A mark used to indicate the existence of a causeway."
      - name: "Wave Recorder"
        definition: "A surface following buoy used to measure wave activity."
      - name: "Jetski Prohibited"
        definition: "A mark indicating a jetski prohibited area."
    remarks: "A mark may be a beacon, a buoy, a signpost or may take another form."

  - title: "Estimated Range of Transmission"
    definition: "The estimated range of a non-optical electromagnetic transmission."
    sub_definitions: []
    remarks: "The estimated range (distance) assumes 'in vacuo' transmission and a standard antenna height of 5 metres. Thus it gives a hint to the mariner whether they are likely to receive transmission at a certain distance from an object."

  - title: "Category of Radio Station"
    definition: "Classification of radio services offered by a radio station."
    sub_definitions:
      - name: "Circular (Non-Directional) Marine or Aero-Marine Radiobeacon"
        definition: "A radio station which need not necessarily be manned, the emissions of which, radiated around the horizon, enable its bearing to be determined by means of the radio direction finder of a ship."
      - name: "Directional Radiobeacon"
        definition: "A special type of radiobeacon station the emissions of which are intended to provide a definite track for guidance."
      - name: "Rotating Pattern Radiobeacon"
        definition: "A special type of radiobeacon station emitting a beam of waves to which a uniform turning movement is given, the bearing of the station being determined by means of an ordinary listening receiver and a stop watch. Also referred to as a rotating loop radiobeacon."
      - name: "Consol Beacon"
        definition: "A type of long range position fixing beacon."
      - name: "Radio Direction-Finding Station"
        definition: "A radio station intended to determine only the direction of other stations by means of transmission from the latter."
      - name: "Coast Radio Station Providing QTG Service"
        definition: "A radio station which is prepared to provide QTG service; that is to say, to transmit upon request from a ship a radio signal, the bearing of which can be taken by that ship."
      - name: "Aeronautical Radiobeacon"
        definition: "A radio beacon designed for aeronautical use."
      - name: "Decca"
        definition: "The Decca Navigator System is a high accuracy, short to medium range radio navigational aid intended for coastal and landfall navigation."
      - name: "Loran C"
        definition: "A low frequency electronic position fixing system using pulsed transmissions at 100 Khz."
      - name: "Differential GNSS"
        definition: "A radiobeacon transmitting DGPS correction signals."
      - name: "Toran"
        definition: "An electronic position fixing system used mainly by aircraft."
      - name: "Omega"
        definition: "A long-range radio navigational aid which operates within the VLF frequency band. The system comprises eight land based stations."
      - name: "Syledis"
        definition: "A ranging position fixing system operating at 420-450 MHz over a range of up to 400 Km."
      - name: "Chaika"
        definition: "Chaika is a low frequency electronic position fixing system using pulsed transmissions at 100 Khz."
      - name: "Radio Telephone Station"
        start: 19
        definition: "The equipment needed at one station to carry on two way voice communication by radio waves only."
      - name: "AIS Base Station"
        definition: "An onshore AIS unit that monitors traffic in the waterways."
    remarks: "A radiobeacon is a radio transmitter which emits a distinctive or characteristic signal on which a bearing may be taken."

  - title: "Type of Environmental Observation Equipment"
    definition: "Type of sensor used to observe the environment. For example Anemometer, fog monitor, etc."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Value of Maximum Range"
    definition: "The extreme distance at which an feature can be seen or a signal detected."
    sub_definitions: []
    remarks: "Does not apply to lights where the 'value of nominal range' should be used."

  - title: "Signal Period"
    definition: "The time occupied by an entire cycle of intervals of light and eclipse."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Signal Output"
    definition: "Strength of signal output."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Signal Group"
    definition: "The number of signals, the combination of signals or the morse character(s) within one period of full sequence."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Signal Frequency"
    definition: "The frequency of a signal."
    sub_definitions: []
    remarks: "No remarks."

  - title: "Category of Fog Signal"
    definition: "Classification of the various means of generating the fog signal."
    sub_definitions:
      - name: "Explosive"
        definition: "A signal produced by the firing of explosive charges."
      - name: "Diaphone"
        definition: "A diaphone uses compressed air and generally emits a powerful low-pitched sound, which often concludes with a brief sound of suddenly lowered pitch, termed the 'grunt'."
      - name: "Siren"
        definition: "A type of fog signal apparatus which produces sound by virtue of the passage of air through slots or holes in a revolving disk."
      - name: "Nautophone"
        definition: "A horn having a diaphragm oscillated by electricity."
      - name: "Reed"
        definition: 
          - "[1] A reed uses compressed air and emits a weak, high pitched sound."
          - "[2] Any of various water or marsh plants with a firm stem. (Concise Oxford English Dictionary)"
      - name: "Tyfon"
        definition: "A diaphragm horn which operates under the influence of compressed air or steam."
      - name: "Bell"
        definition: "A ringing sound with a short range."
      - name: "Whistle"
        definition: "A distinctive sound made by a jet of air passing through an orifice. The apparatus may be operated automatically, by hand or by air being forced up a tube by waves acting on a buoy."
      - name: "Gong"
        definition: "A sound produced by vibration of a disc when struck."
      - name: "Horn"
        definition: "A horn uses compressed air or electricity to vibrate a diaphragm and exists in a variety of types which differ greatly in their sound and power."
    remarks: "The classification 'horn' is the generic term for fog signals 'nautophone', 'reed' and 'tyfon'."

  - title: "Value of Nominal Range"
    definition: "The luminous range of a light in a homogenous atmosphere in which the meteorological visibility is 10 sea miles."
    remarks: "No remarks."

  - title: "Value of Luminous Range"
    definition: "The greatest distance at which a light can be seen merely as a function of its luminous intensity, the meteorological visibility, and the sensitivity of the observer's eye."
    remarks: "No remarks."

  - title: "Value of Geographic Range"
    definition: "The greatest distance at which a light can be seen as a function of the curvature of the earth and the heights of the light source and the observer."
    remarks: "No remarks."

  - title: "Major Light"
    definition: "A statement expressing if a light is considered to be a major light in terms of ECDIS display in a particular area."
    remarks: "Major light is only intended to provide an indication to the ECDIS that the light is considered to be an important light in terms of its display. As such this is a cartographic attribute to aid the compiler in determining the most appropriate display for a light; it is not intended to be used as a formal classification method for lights."

  - title: "Light Visibility"
    definition: "The specific visibility of a light, with respect to the light's intensity and ease of recognition."
    sub_definitions:
      - name: "High Intensity"
        definition: "Non-marine lights with a higher power than marine lights and visible from well off shore (often 'Aero' lights)."
      - name: "Low Intensity"
        definition: "Non-marine lights with lower power than marine lights."
      - name: "Faint"
        definition: "A decrease in the apparent intensity of a light which may occur in the case of partial obstructions."
      - name: "Intensified"
        definition: "A light in a sector is intensified (that is, has longer range than other sectors)."
      - name: "Unintensified"
        definition: "A light in a sector is unintensified (that is, has shorter range than other sectors)."
      - name: "Visibility Deliberately Restricted"
        definition: "A light sector is deliberately reduced in intensity, for example to reduce its effect on a built-up area."
      - name: "Obscured"
        definition: "Said of the arc of a light sector designated by its limiting bearings in which the light is not visible from seaward."
      - name: "Partially Obscured"
        definition: "This value specifies that parts of the sector are obscured."
      - name: "Visible in Line of Range"
        definition: "Lights that must in line to be visible."
    remarks: "No remarks."

  - title: "Signal Generation"
    definition: "The mechanism used to generate a fog or light signal."
    sub_definitions:
      - name: "Automatically"
        definition: "Signal generation is initiated by a self regulating mechanism such as a timer or light sensor."
      - name: "By Wave Action"
        definition: "The signal is generated by the motion of the sea surface such as a bell in a buoy."
      - name: "By Hand"
        definition: "The signal is generated by a manually operated mechanism such as a hand cranked siren."
      - name: "By Wind"
        definition: "The signal is generated by the motion of air such as a wind driven whistle."
      - name: "Radio Activated"
        definition: "Activated by radio signal."
      - name: "Call Activated"
        definition: "Activated by making a call to a manned station."
    remarks: "No remarks."

  - title: "Exhibition Condition of Light"
    definition: "The outward display of the light."
    sub_definitions:
      - name: "Light Shown Without Change of Character"
        definition: "A light shown throughout the 24 hours without change of character."
      - name: "Daytime Light"
        definition: "A light which is only exhibited by day."
      - name: "Fog Light"
        definition: "A light which is exhibited in fog or conditions of reduced visibility."
      - name: "Night Light"
        definition: "A light which is only exhibited at night."
    remarks: "No remarks."

  - title: "Category of Light"
    definition: "Classification of different light types."
    sub_definitions:
      - name: "Directional Function"
        definition: "A light illuminating a sector of very narrow angle and intended to mark a direction to follow."
      - name: "Leading Light"
        start: 4
        definition: "A light associated with other lights so as to form a leading line to be followed."
      - name: "Aero Light"
        definition: "An aero light is established for aeronautical navigation and may be of higher power than marine lights and visible from well offshore."
      - name: "Air Obstruction Light"
        definition: "A light marking an obstacle which constitutes a danger to air navigation."
      - name: "Flood Light"
        start: 8
        definition: "A broad beam light used to illuminate a structure or area."
      - name: "Strip Light"
        definition: "A light whose source has a linear form generally horizontal, which can reach a length of several metres."
      - name: "Subsidiary Light"
        definition: "A light placed on or near the support of a main light and having a special use in navigation."
      - name: "Spotlight"
        definition: "A powerful light focused so as to illuminate a small area."
      - name: "Front"
        definition: "Term used with leading lights to describe the position of the light on the lead as viewed from seaward."
      - name: "Rear"
        definition: "Term used with leading lights to describe the position of the light on the lead as viewed from seaward."
      - name: "Lower"
        definition: "Term used with leading lights to describe the position of the light on the lead as viewed from seaward."
      - name: "Upper"
        definition: "Term used with leading lights to describe the position of the light on the lead as viewed from seaward."
      - name: "Emergency"
        start: 17
        definition: "A light available as a backup to a main light which will be illuminated should the main light fail."
      - name: "Bearing Light"
        definition: "A light which enables its approximate bearing to be obtained without the use of a compass."
      - name: "Horizontally Disposed"
        definition: "A group of lights of identical character and almost identical position, that are disposed horizontally."
      - name: "Vertically Disposed"
        definition: "A group of lights of identical character and almost identical position, that are disposed vertically."
    remarks: "All lights are considered to be marine lights unless the category of light indicates otherwise."

  - title: "Traffic Flow"
    definition: "Direction of vessels passing a reference point."
    sub_definitions:
      - name: "Inbound"
        definition: "Traffic flow in a general direction toward a port or similar destination."
      - name: "Outbound"
        definition: "Traffic flow in a general direction away from a port or similar point of origin."
      - name: "One-Way"
        definition: "Traffic flow in one general direction only."
      - name: "Two-Way"
        definition: "Traffic flow in two generally opposite directions."
    remarks: "No remarks."

  - title: "Technique of Vertical Measurement"
    definition: "Survey method used to obtain depth information."
    sub_definitions:
      - name: "Found by Echo Sounder"
        definition: "The depth was determined by using an instrument that determines depth of water by measuring the time interval between emission of a sonic or ultrasonic signal and return of its echo from the bottom."
      - name: "Found by Side Scan Sonar"
        definition: "The depth was computed from a record produced by active sonar in which fixed acoustic beams are directed into the water perpendicularly to the direction of travel to scan the seabed and generate a record of the seabed configuration."
      - name: "Found by Multi Beam"
        definition: "The depth was determined by using a wide swath echo sounder that uses multiple beams to measure depths directly below and transverse to the ship's track."
      - name: "Found by Diver"
        definition: "The depth was determined by a person skilled in the practice of diving."
      - name: "Found by Lead Line"
        definition: "The depth was determined by using a line, graduated with attached marks and fastened to a sounding lead."
      - name: "Swept by Wire-Drag"
        definition: "The given area was determined to be free from navigational dangers to a certain depth by towing a buoyed wire at the desired depth by two launches, or a least depth was identified using the same technique."
      - name: "Found by Laser"
        definition: "The depth was determined by using an instrument that measures distance by emitting timed pulses of laser light and measuring the time between emission and reception of the reflected pulses."
      - name: "Swept by Vertical Acoustic System"
        definition: "The given area has been swept using a system comprised of multiple echo sounder transducers attached to booms deployed from the survey vessel."
      - name: "Found by Electromagnetic Sensor"
        definition: "The depth was determined by using an instrument that compares electromagnetic signals."
      - name: "Photogrammetry"
        definition: "The science or art of obtaining reliable measurements from photographs."
      - name: "Satellite Imagery"
        definition: "The depth was determined by using instruments placed aboard an artificial satellite."
      - name: "Found by Levelling"
        definition: "The depth was determined by using levelling techniques to find the elevation of the point relative to a datum."
      - name: "Swept by Side Scan Sonar"
        definition: "The given area was determined to be free from navigational dangers to a certain depth by towing a side scan sonar."
      - name: "Computer Generated"
        definition: "The sounding was determined from a bottom model constructed using a computer."
      - name: "Found by LIDAR"
        definition: "The depth was measured by using an instrument that measures distance by emitting timed pulses of laser light and measuring the time between emission and reception of the reflected pulses."
      - name: "Synthetic Aperture Radar"
        definition: "A radar with a synthetic aperture antenna which is composed of a large number of elementary transducing elements. The signals are electronically combined into a resulting signal equivalent to that of a single antenna of a given aperture in a given direction."
      - name: "Hyperspectral Imagery"
        definition: "Term used to describe the imagery derived from subdividing the electromagnetic spectrum into very narrow bandwidths. These narrow bandwidths may be combined with or subtracted from each other in various ways to form images useful in precise terrain or target analysis."

  - title: "Quality of Vertical Measurement"
    definition: "The reliability of the value of a sounding."
    sub_definitions:
      - name: "Depth Known"
        definition: "The depth from the chart datum to the seabed (or to the top of a drying feature) is known."
      - name: "Depth or Least Depth Unknown"
        definition: "The depth from chart datum to the seabed, or the shoalest depth of the feature is unknown."
      - name: "Doubtful Sounding"
        definition: "A depth that may be less than indicated."
      - name: "Unreliable Sounding"
        definition: "A depth that is considered to be an unreliable value."
      - name: "No Bottom Found at Value Shown"
        definition: "Upon investigation the bottom was not found at this depth."
      - name: "Least Depth Known"
        definition: "The shoalest depth over a feature is of known value."
      - name: "Least Depth Unknown, Safe Clearance at Value Shown"
        definition: "The least depth over a feature is unknown, but there is considered to be safe clearance at this depth."
      - name: "Value Reported (Not Surveyed)"
        definition: "Depth value obtained from a report, but not fully surveyed."
      - name: "Value Reported (Not Confirmed)"
        definition: "Depth value obtained from a report, which it has not been possible to confirm."
      - name: "Maintained Depth"
        definition: "The depth at which a channel is kept by human influence, usually by dredging."
      - name: "Not Regularly Maintained"
        definition: "Depths may be altered by human influence, but will not be routinely maintained."

  - title: "Maximal Permitted Draught"
    definition: "The maximal permitted draught of a vessel or convoy according to the particular article/clause of the applicable law/regulation."

  - title: "Depth Range Minimum Value"
    definition: "The minimum (shoalest) value of a depth range."
    remarks: "Where the area dries, the value is negative."

  - title: "Based On Fixed Marks"
    definition: "A straight route (known as a recommended track, range or leading line), which comprises: a. at least two structures (usually beacons or daymarks) and/or natural features, which may carry lights and/or top-marks. The structures/features are positioned so that when observed to be in line, a vessel can follow a known bearing with safety. (Adapted from International Association of Lighthouse Authorities - IALA Aids to Navigation Guide, 1990); or b. a single structure or natural feature, which may carry lights and/or a topmark, and a specified bearing which can be followed with safety. (S-57 Edition 3.1, Appendix A Chapter 2, Page 2.72, November 2000, as amended)."
    remarks: "No remarks."

  - title: "Category of Navigation Line"
    definition: "Classification of route guidance given to vessels."
    sub_definitions:
      - name: "Clearing Line"
        definition: "A straight line that marks the boundary between a safe and a dangerous area or that passes clear of a navigational danger."
      - name: "Transit Line"
        definition: "A line passing through one or more fixed marks."
      - name: "Leading Line Bearing a Recommended Track"
        definition: "A line passing through one or more clearly defined objects, along the path of which a vessel can approach safely up to a certain distance off."
    remarks: "No remarks."

  - title: "Category of Lateral Mark"
    definition: "Classification of lateral marks in the IALA Buoyage System."
    sub_definitions:
      - name: "Port-Hand Lateral Mark"
        definition: "Indicates the port boundary of a navigational channel or suggested route when proceeding in the \"conventional direction of buoyage\"."
      - name: "Starboard-Hand Lateral Mark"
        definition: "Indicates the starboard boundary of a navigational channel or suggested route when proceeding in the \"conventional direction of buoyage\"."
      - name: "Preferred Channel to Starboard Lateral Mark"
        definition: "At a point where a channel divides, when proceeding in the \"conventional direction of buoyage\", the preferred channel (or primary route) is indicated by a modified port-hand lateral mark."
      - name: "Preferred Channel to Port Lateral Mark"
        definition: "At a point where a channel divides, when proceeding in the \"conventional direction of buoyage\", the preferred channel (or primary route) is indicated by a modified starboard-hand lateral mark."
      - name: "Right-Hand Side of the Waterway"
        definition: "Indicates the right-hand side of the inland waterway."
      - name: "Left-Hand Side of the Waterway"
        definition: "Indicates the left-hand side of the inland waterway."
      - name: "Right-Hand Side of the Channel"
        definition: "Indicates the right-hand side of a channel of an inland waterway."
      - name: "Left-Hand Side of the Channel"
        definition: "Indicates the left-hand side of a channel of an inland waterway."
      - name: "Bifurcation of the Waterway"
        definition: "Indicates a bifurcation of the inland waterway."
      - name: "Bifurcation of the Channel"
        definition: "Indicates a bifurcation of a channel of an inland waterway."
      - name: "Channel Near the Right Bank"
        definition: "Indicates that the channel is near the right bank."
      - name: "Channel Near the Left Bank"
        definition: "Indicates that the channel is near the left bank."
      - name: "Channel Cross-Over to the Right Bank"
        definition: "Indicates that the channel crosses from the left to the right bank."
      - name: "Channel Cross-Over to the Left Bank"
        definition: "Indicates that the channel crosses from the right to the left bank."
      - name: "Danger Point or Obstacles at the Right-Hand Side"
        definition: "Indicates a danger point or obstacles at the right-hand side."
      - name: "Danger Point or Obstacles at the Left-Hand Side"
        definition: "Indicates a danger point or obstacles at the left-hand side."
      - name: "Turn Off at the Right-Hand Side"
        definition: "Indicates a turn off at the right-hand side."
      - name: "Turn Off at the Left-Hand Side"
        definition: "Indicates a turn off at the left-hand side."
      - name: "Junction at the Right-Hand Side"
        definition: "Indicates a junction at the right-hand side."
      - name: "Junction at the Left-Hand Side"
        definition: "Indicates a junction at the left-hand side."
      - name: "Harbour Entry at the Right-Hand Side"
        definition: "Indicates a harbour entry at the right-hand side."
      - name: "Harbour Entry at the Left-Hand Side"
        definition: "Indicates a harbour entry at the left-hand side."
      - name: "Bridge Pier Mark"
        definition: "Indicates a bridge pier in an inland waterway."
      - name: "Entry From a Lake to a Narrower Waterway, Right Bank"
        definition: "Indicates the right bank of the entry from a lake or a lake-like expansion to a section of the waterway which is narrower."
      - name: "Entry From a Lake to a Narrower Waterway, Left Bank"
        definition: "Indicates the left bank of the entry from a lake or a lake-like expansion to a section of the waterway which is narrower."
      - name: "Change Bank"
        definition: "Change bank."
      - name: "Continue Along Bank"
        definition: "Continue along bank."
    remarks: "There are two international buoyage regions, A and B, between which lateral marks differ. When top-marks, retro reflectors and/or lights are fitted to these marks, they are encoded as separate features."

  - title: "Manned Structure"
    definition: "An expression of the feature being permanently manned or not."
    remarks: "No remarks."

  - title: "Vertical Datum"
    definition: "The reference level used for expressing the vertical measurements of points on the earth's surface. Also called datum level, reference plane, levelling datum, datum for sounding reduction, datum for heights."
    sub_definitions:
      - name: "Mean Low Water Springs"
        definition: "The average height of the low waters of spring tides. This level is used as a tidal datum in some areas. Also called spring low water."
      - name: "Mean Lower Low Water Springs"
        definition: "The average height of lower low water springs at a place."
      - name: "Mean Sea Level"
        definition: "The average height of the surface of the sea at a tide station for all stages of the tide over a 19-year period, usually determined from hourly height readings measured from a fixed predetermined reference level."
      - name: "Lowest Low Water"
        definition: "An arbitrary level conforming to the lowest tide observed at a place, or somewhat lower."
      - name: "Mean Low Water"
        definition: "The average height of all low waters at a place over a 19-year period."
      - name: "Lowest Low Water Springs"
        definition: "An arbitrary level conforming to the lowest water level observed at a place at spring tides during a period of time shorter than 19 years."
      - name: "Approximate Mean Low Water Springs"
        definition: "An arbitrary level, usually within 0.3m from that of Mean Low Water Springs (MLWS)."
      - name: "Indian Spring Low Water"
        definition: "An arbitrary tidal datum approximating the level of the mean of the lower low water at spring tides. It was first used in waters surrounding India."
      - name: "Low Water Springs"
        definition: "An arbitrary level, approximating that of mean low water springs (MLWS)."
      - name: "Approximate Lowest Astronomical Tide"
        definition: "An arbitrary level, usually within 0.3m from that of Lowest Astronomical Tide (LAT)."
      - name: "Nearly Lowest Low Water"
        definition: "An arbitrary level approximating the lowest water level observed at a place, usually equivalent to the Indian Spring Low Water (ISLW)."
      - name: "Mean Lower Low Water"
        definition: "The average height of the lower low waters at a place over a 19-year period."
      - name: "Low Water"
        definition: "The lowest level reached at a place by the water surface in one oscillation. Also called low tide."
      - name: "Approximate Mean Low Water"
        definition: "An arbitrary level, usually within 0.3m from that of Mean Low Water (MLW)."
      - name: "Approximate Mean Lower Low Water"
        definition: "An arbitrary level, usually within 0.3m from that of Mean Lower Low Water (MLLW)."
      - name: "Mean High Water"
        definition: "The average height of all high waters at a place over a 19-year period."
      - name: "Mean High Water Springs"
        definition: "The average height of the high waters of spring tides. Also called spring high water."
      - name: "High Water"
        definition: "The highest level reached at a place by the water surface in one oscillation."
      - name: "Approximate Mean Sea Level"
        definition: "An arbitrary level, usually within 0.3m from that of Mean Sea Level (MSL)."
      - name: "High Water Springs"
        definition: "An arbitrary level, approximating that of mean high water springs (MHWS)."
      - name: "Mean Higher High Water"
        definition: "The average height of higher high waters at a place over a 19-year period."
      - name: "Equinoctial Spring Low Water"
        definition: "The level of low water springs near the time of an equinox."
      - name: "Lowest Astronomical Tide"
        definition: "The lowest tide level which can be predicted to occur under average meteorological conditions and under any combination of astronomical conditions."
      - name: "Local Datum"
        definition: "An arbitrary datum defined by a local harbour authority, from which levels and tidal heights are measured by this authority."
      - name: "International Great Lakes Datum 1985"
        definition: "A vertical reference system with its zero based on the *mean water level* at Rimouski/Pointe-au-Pere, Quebec, over the period 1970 to 1988."
      - name: "Mean Water Level"
        definition: "The average of all hourly water levels over the available period of record."
      - name: "Lower Low Water Large Tide"
        definition: "The average of the lowest low waters, one from each of 19 years of observations."
      - name: "Higher High Water Large Tide"
        definition: "The average of the highest high waters, one from each of 19 years of observations."
      - name: "Nearly Highest High Water"
        definition: "An arbitrary level approximating the highest water level observed at a place, usually equivalent to the high water springs."
      - name: "Highest Astronomical Tide"
        definition: "The highest tidal level which can be predicted to occur under average meteorological conditions and under any combination of astronomical conditions."
      - name: "Local Low Water Reference Level"
        definition: "Low water reference level of the local area."
      - name: "Local High Water Reference Level"
        definition: "High water reference level of the local area."
      - name: "Local Mean Water Reference Level"
        definition: "Mean water reference level of the local area."
      - name: "Equivalent Height of Water (German GlW)"
        definition: "A low water level which is the result of a defined low water discharge - called \"equivalent discharge\"."
      - name: "Highest Shipping Height of Water (German HSW)"
        definition: "Upper limit of water levels where navigation is allowed."
      - name: "Reference Low Water Level According to Danube Commission"
        definition: "The water level at a discharge, which is exceeded 94 % of the year within a period of 30 years."
      - name: "Highest Shipping Height of Water According to Danube Commission"
        definition: "The water level at a discharge, which is exceeded 1% of the year within a period of 30 years."
      - name: "Dutch River Low Water Reference Level (OLR)"
        definition: "The water level at a discharge, which is exceeded 95% of the year within a period of 20 years."
      - name: "Russian Project Water Level"
        definition: "Conditional low water level with established probability."
      - name: "Russian Normal Backwater Level"
        definition: "Highest water level derived from the upper backwater stream in watercourse or reservoir under the normal operational conditions."
      - name: "Ohio River Datum"
        definition: "The Ohio River datum."
      - name: "Dutch High Water Reference Level"
        start: 43
        definition: "Dutch High Water Reference Level."
      - name: "Baltic Sea Chart Datum 2000"
        definition: "The datum refers to each Baltic country's realization of the European Vertical Reference System (EVRS) with land-uplift epoch 2000, which is connected to the Normaal Amsterdams Peil (NAP)."
      - name: "Dutch Estuary Low Water Reference Level (OLW)"
        definition: "Dutch Estuary Low Water Reference Level (OLW)."
    remarks: "No remarks."

  - title: "Function"
    definition: "A specific role that describes a feature."
    sub_definitions:
      - name: "Harbour-Masters Office"
        start: 2
        definition: "A local official who has charge of mooring and berthing of vessels, collecting harbour fees, etc."
      - name: "Customs Office"
        definition: "Serves as a government office where customs duties are collected, the flow of goods are regulated and restrictions enforced, and shipments or vehicles are cleared for entering or leaving a country."
      - name: "Health Office"
        definition: "The office which is charged with the administration of health laws and sanitary inspections."
      - name: "Hospital"
        definition: "An institution or establishment providing medical or surgical treatment for the ill or wounded."
      - name: "Post Office"
        definition: "The public department, agency or organisation responsible primarily for the collection, transmission and distribution of mail."
      - name: "Hotel"
        definition: "An establishment, especially of a comfortable or luxurious kind, where paying visitors are provided with accommodation, meals and other services."
      - name: "Railway Station"
        definition: "A building with platforms where trains arrive, load, discharge and depart."
      - name: "Police Station"
        definition: "The headquarters of a local police force and that is where those under arrest are first charged."
      - name: "Water-Police Station"
        definition: "The headquarters of a local water-police force."
      - name: "Pilot Office"
        definition: "The office or headquarters of pilots; the place where the services of a pilot may be obtained."
      - name: "Pilot Lookout"
        definition: "A distinctive structure or place on shore from which personnel keep watch upon events at sea or along the coast."
      - name: "Bank Office"
        definition: "An office for custody, deposit, loan, exchange or issue of money."
      - name: "Headquarters for District Control"
        definition: "The quarters of an executive officer (director, manager, etc.) with responsibility for an administrative area."
      - name: "Transit Shed/Warehouse"
        definition: "A building or part of a building for storage of wares or goods."
      - name: "Factory"
        definition: "A building or buildings with equipment for manufacturing; a workshop."
      - name: "Power Station"
        definition: "A stationary plant containing apparatus for large scale conversion of some form of energy (such as hydraulic, steam, chemical or nuclear energy) into electrical energy."
      - name: "Administrative"
        definition: "A building for the management of affairs."
      - name: "Educational Facility"
        definition: "A building concerned with education (for example school, college, university, etc)."
      - name: "Church"
        definition: "A building for public Christian worship."
      - name: "Chapel"
        definition: "A place for Christian worship other than a parish, cathedral or church, especially one attached to a private house or institution."
      - name: "Temple"
        definition: "A building for public Jewish worship."
      - name: "Pagoda"
        definition: "A Hindu or Buddhist temple or sacred building."
      - name: "Shinto Shrine"
        definition: "A building for public Shinto worship."
      - name: "Buddhist Temple"
        definition: "A building for public Buddhist worship."
      - name: "Mosque"
        definition: "A Muslim place of worship."
      - name: "Marabout"
        definition: "A shrine marking the burial place of a Muslim holy man."
      - name: "Lookout"
        definition: "Keeping a watch upon events at sea or along the coast."
      - name: "Communication"
        definition: "Transmitting and/or receiving electronic communication signals."
      - name: "Television"
        definition: "A system for reproducing on a screen visual images transmitted (usually with sound) by radio signals."
      - name: "Radio"
        definition: "Transmitting and/or receiving radio-frequency electromagnetic waves as a means of communication."
      - name: "Radar"
        definition: "A method, system or technique of using beamed, reflected, and timed radio waves for detecting, locating, or tracking objects, and for measuring altitudes."
      - name: "Light Support"
        definition: "A structure serving as a support for one or more lights."
      - name: "Microwave"
        definition: "Broadcasting and receiving signals using microwaves."
      - name: "Cooling"
        definition: "Generation of chilled liquid and/or gas for cooling purposes."
      - name: "Observation"
        definition: "A place from which the surroundings can be observed but at which a watch is not habitually maintained."
      - name: "Timeball"
        definition: "A visual time signal in the form of a ball."
      - name: "Clock"
        definition: "Instrument for measuring time and recording hours."
      - name: "Control"
        definition: "Used to control the flow of traffic within a specified range of an installation."
      - name: "Airship Mooring"
        definition: "Equipment or structure to secure an airship."
      - name: "Stadium"
        definition: "An arena for holding and viewing events."
      - name: "Bus Station"
        definition: "A building where buses and coaches regularly stop to take on and/or let off passengers, especially for long-distance travel."
      - name: "Passenger Terminal Building"
        definition: "A building within a terminal for the loading and unloading of passengers."
      - name: "Sea Rescue Control"
        definition: "A unit responsible for promoting efficient organization of search and rescue services and for coordinating the conduct of search and rescue operations within a search and rescue region."
      - name: "Observatory"
        definition: "A building designed and equipped for making observations of astronomical, meteorological, or other natural phenomena."
      - name: "Ore Crusher"
        definition: "A building or structure used to crush ore."
      - name: "Boathouse"
        definition: "A building or shed, usually built partly over water, for sheltering a boat or boats."
      - name: "Pumping Station"
        definition: "A facility to move solids, liquids or gases by means of pressure or suction."
    remarks: "No remarks."

  - title: "Category of Landmark"
    definition: Classification of prominent cultural and natural features in the landscape.
    sub_definitions:
      - name: "Cairn"
        definition: "A mound of stones, usually conical or pyramidal, raised as a landmark or to designate a point of importance in surveying."
      - name: "Cemetery"
        definition: "A site and associated structures devoted to the burial of the dead."
      - name: "Chimney"
        definition: "A vertical structure containing a passage or flue for discharging smoke and gases of combustion."
      - name: "Dish Aerial"
        definition: "A parabolic aerial for the receipt and transmission of high frequency radio signals."
      - name: "Flagstaff"
        definition: "A staff or pole on which flags are raised."
      - name: "Flare Stack"
        definition: "A tall structure used for burning-off waste oil or gas."
      - name: "Mast"
        definition: "A relatively tall structure usually held vertical by guy lines."
      - name: "Windsock"
        definition: "A tapered fabric sleeve mounted so as to catch and swing with the wind, thus indicating the wind direction."
      - name: "Monument"
        definition: "A structure erected and/or maintained as a memorial to a person and/or event."
      - name: "Column/Pillar"
        definition: "A cylindrical or slightly tapering body of considerably greater length than diameter erected vertically."
      - name: "Memorial Plaque"
        definition: "A slab of metal, usually ornamented, erected as a memorial to a person or event."
      - name: "Obelisk"
        definition: "A tapering shaft usually of stone or concrete, square or rectangular in section, with a pyramidal apex."
      - name: "Statue"
        definition: "A representation of a living being, sculptured, moulded, or cast in a variety of materials (for example: marble, metal, or plaster)."
      - name: "Cross"
        definition: "A monument, or other structure in form of a cross."
      - name: "Dome"
        definition: "A landmark comprising a hemispherical or spheroidal shaped structure."
      - name: "Radar Scanner"
        definition: "A device used for directing a radar beam through a search pattern."
      - name: "Tower"
        definition: "A relatively tall, narrow structure that may either stand alone or may form part of another structure."
      - name: "Windmill"
        definition: "A system of vanes attached to a tower and driven by wind (excluding wind turbines)."
      - name: "Windmotor"
        definition: "A modern structure for the use of wind power."
      - name: "Spire/Minaret"
        definition: "A tall conical or pyramid-shaped structure often built on the roof or tower of a building, especially a church or mosque."
      - name: "Large Rock or Boulder on Land"
        definition: "An isolated rocky formation or a single large stone."
      - name: "Triangulation Mark"
        definition: "A recoverable point on the earth, whose geographic position has been determined by angular methods with geodetic instruments. A triangulation point is a selected point, which has been marked with a station mark, or it is a conspicuous natural or artificial feature."
      - name: "Boundary Mark"
        definition: "A marker identifying the location of a surveyed boundary line."
      - name: "Observation Wheel"
        definition: "Wheels with passenger cars mounted external to the rim and independently rotated by electric motors."
      - name: "Torii"
        definition: "A form of decorative gateway or portal, consisting of two upright wooden posts connected at the top by two horizontal crosspieces, commonly found at the entrance to Shinto temples."
      - name: "Bridge"
        definition: "(1) An elevated structure extending across or over the weather deck of a vessel, or part of such a structure. The term is sometimes modified to indicate the intended use, such as navigating bridge or signal bridge. (2) A structure erected over a depression or an obstacle such as a body of water, railroad, etc., to provide a roadway for vehicles or pedestrians."
      - name: "Dam"
        definition: "A barrier to check or confine anything in motion; particularly one constructed to hold back water and raise its level to form a reservoir, or to prevent flooding."
    remarks: "No remarks."

  - title: "Type of Buoy"
    definition: "Type equipment used as a buoy in a particular installation."
    remarks: "Types of light buoy; for example LANBY-100, LS-35, LL-30, LL-28, LL-26, LL-26(M), LL-24, LS-24, LSP-24, LT-10. Types of buoy e.g. U-17C(P), U-17S(P), U-17C(S), U-17S(S), UR-17C(P), UR-17S(P), UR-17C(S), UR-17."

  - title: "Buoy Shape"
    definition: "The principal shape and/or design of a buoy."
    sub_definitions:
      - name: "Conical"
        definition: "The upper part of the body above the water-line, or the greater part of the superstructure, has approximately the shape or the appearance of a pointed cone with the point upwards."
      - name: "Can"
        definition: "The upper part of the body above the water-line, or the greater part of the superstructure, has the shape of a cylinder, or a truncated cone that approximates to a cylinder, with a flat end uppermost."
      - name: "Spherical"
        definition: "Shaped like a sphere, which is a body the surface of which is at all points equidistant from the centre."
      - name: "Pillar"
        definition: "The upper part of the body above the water-line, or the greater part of the superstructure is a narrow vertical structure, pillar or lattice tower."
      - name: "Spar"
        definition: "The upper part of the body above the water-line, or the greater part of the superstructure, has the form of a pole, or of a very long cylinder, floating upright."
      - name: "Barrel"
        definition: "The upper part of the body above the water-line, or the greater part of the superstructure, has the form of a barrel or cylinder floating horizontally."
      - name: "Superbuoy"
        definition: "A very large buoy designed to carry a signal light of high luminous intensity at a high elevation."
      - name: "Ice Buoy"
        definition: "A specially constructed shuttle shaped buoy which is used in ice conditions."
    remarks: "The principal shapes are those recommended in the International Association of Lighthouse Authorities - IALA System."

  - title: "Visual Prominence"
    definition: "The extent to which a feature, either natural or artificial, is visible from seaward."
    sub_definitions:
      - name: "Visually Conspicuous"
        definition: "Term applied to a feature either natural or artificial which is distinctly and notably visible from seaward."
      - name: "Not Visually Conspicuous"
        definition: "An object that may be visible from seaward, but cannot be used as a fixing mark and is not conspicuous."
      - name: "Prominent"
        definition: "Objects which are easily identifiable, but do not justify being classed as conspicuous."
    remarks: "No remarks."

  - title: "Vertical Length"
    definition: "The total vertical length of a feature."
    remarks: |
      For floating objects: the vertical distance from the surface of water to the highest point of that object.
      
      For fixed objects: the vertical distance from seabed or ground to the highest point of that object.
      
      For objects on top of other objects: the vertical distance from the lowest to the highest point of that object.
      
      Vertical length measurements do not require a datum.

  - title: "Status"
    definition: "The condition of an object at a given instant in time."
    sub_definitions:
      - name: "Permanent"
        definition: "Intended to last or function indefinitely."
      - name: "Occasional"
        definition: "Acting on special occasions; happening irregularly."
      - name: "Recommended"
        definition: "Presented as worthy of confidence, acceptance, use, etc."
      - name: "Not in Use"
        definition: "Use has ceased, but the facility still exists intact; disused."
      - name: "Periodic/Intermittent"
        definition: "Recurring at intervals."
      - name: "Reserved"
        definition: "Set apart for some specific use."
      - name: "Temporary"
        definition: "Meant to last only for a time."
      - name: "Private"
        definition: "Administered by an individual or corporation, rather than a State or a public body."
      - name: "Mandatory"
        definition: "Compulsory; enforced."
      - name: "Extinguished"
        start: 11
        definition: "No longer lit."
      - name: "Illuminated"
        definition: "Lit by floodlights, strip lights, etc."
      - name: "Historic"
        definition: "Famous in history; of historical interest."
      - name: "Public"
        definition: "Belonging to, available to, used or shared by, the community as a whole and not restricted to private use."
      - name: "Synchronized"
        definition: "Occur at a time, coincide in point of time, be contemporary or simultaneous."
      - name: "Watched"
        definition: "Looked at or observed over a period of time especially so as to be aware of any movement or change."
      - name: "Unwatched"
        definition: "Usually automatic in operation, without any permanently-stationed personnel to superintend it."
      - name: "Existence Doubtful"
        definition: "A feature that has been reported but has not been definitely determined to exist."
      - name: "On Request"
        definition: "When you ask for it."
      - name: "Drop Away"
        definition: "To become lower in level."
      - name: "Rising"
        definition: "To become higher in level."
      - name: "Increasing"
        definition: "Becoming larger in magnitude."
      - name: "Decreasing"
        definition: "Becoming smaller in magnitude."
      - name: "Strong"
        definition: "Not easily broken or destroyed."
      - name: "Good"
        definition: "In a satisfactory condition to use."
      - name: "Moderately"
        definition: "Fairly but not very."
      - name: "Poor"
        definition: "Not as good as it could be or should."
      - name: "Buoyed"
        definition: "Marked by buoys."
      - name: "Fully Operational"
        definition: "Entire observation platform is operating in accordance with, or exceeding, manufacturer specifications."
      - name: "Partially Operational"
        definition: "At least one instrument that is part of an observation platform is not operating to manufacturer specification."
      - name: "Drifting"
        definition: "Floating platform at the mercy of environmental elements, whether intentional or not."
      - name: "Broken"
        definition: "Fractured or in pieces."
      - name: "Offline"
        definition: "Observation platform is intentionally not reporting an environmental observation."
      - name: "Discontinued"
        definition: "Observation station, suite of instruments, or an individual instrument, for a particular location, has been removed and is no longer at the particular location."
      - name: "Manual Observation"
        definition: "Observations made by a human observer."
      - name: "Unknown Status"
        definition: "Status of an observation platform, suite of instruments, or individual instrument is not known or unspecified."
      - name: "Confirmed"
        definition: "Made certain as to truth, accuracy, validity, availability, etc."
      - name: "Candidate"
        definition: "Item selected for an action."
      - name: "Under Modification"
        definition: "Item that is in the process of being modified."
      - name: "Under Removal / Deletion"
        start: 41
        definition: "Item in the process of being removed or deleted."
      - name: "Removed / Deleted"
        definition: "Item that has been removed or deleted."
      - name: "Candidate for Modification"
        definition: "Item selected for modification."
    remarks: "No remarks."

  - title: "Radar Conspicuous"
    definition: "A feature which returns a strong radar echo."
    remarks: "No remarks."

  - title: "Nature of Construction"
    definition: "The building's primary construction material."
    sub_definitions:
      - name: "Masonry"
        definition: "Constructed of stones or bricks, usually quarried, shaped, and mortared."
      - name: "Concreted"
        definition: "Constructed of concrete, a material made of sand and gravel that is united by cement into a hardened mass used for roads, foundations, etc."
      - name: "Loose Boulders"
        definition: "Constructed from large stones or blocks of concrete, often placed loosely for protection against waves or water turbulence."
      - name: "Hard Surfaced"
        definition: "Constructed with a surface of hard material, usually a term applied to roads surfaced with asphalt or concrete."
      - name: "Unsurfaced"
        definition: "Constructed with no extra protection, usually a term applied to roads not surfaced with a hard material."
      - name: "Wooden"
        definition: "Constructed from wood."
      - name: "Metal"
        definition: "Constructed from metal."
      - name: "Glass Reinforced Plastic"
        definition: "Constructed from a plastic material strengthened with fibres of glass."
      - name: "Painted"
        definition: "The application of paint to some other construction or natural feature."
      - name: "Framework"
        definition: "Constructed from a lattice framework of, often diagonal, intersecting struts."
      - name: "Latticed"
        definition: "A structure of crossed wooden or metal strips usually arranged to form a diagonal pattern of open spaces between the strips."
      - name: "Glass"
        definition: "Any artificial or natural substance having similar properties and composition, as fused borax, obsidian, or the like."
      - name: "Fiberglass"
        definition: "Constructed from fiberglass."
      - name: "Plastic"
        definition: "Constructed from plastic."
    remarks: "No remarks."

  - title: "Marks Navigational - System Of"
    definition: "The system of navigational buoyage a region complies with."
    sub_definitions:
      - name: "IALA A"
        definition: "Navigational aids conform to the International Association of Lighthouse Authorities - IALA A system."
      - name: "IALA B"
        definition: "Navigational aids conform to the International Association of Lighthouse Authorities - IALA B system."
      - name: "No System"
        start: 9
        definition: "Navigational aids do not conform to any defined system."
      - name: "Other System"
        definition: "Navigational aids conform to a defined system other than International Association of Lighthouse Authorities - IALA."
      - name: "CEVNI"
        definition: "CEVNI (European Code for Navigation on Inland Waterways) is the European code for rivers, canals land lakes in most of Europe."
      - name: "Russian Inland Waterway Regulations"
        definition: "Navigational aids conform to the Russian inland waterway regulations."
      - name: "Brazilian National Inland Waterway Regulations - Two Sides"
        definition: "Navigational aids conform to the Brazilian national inland waterway regulations for two sides."
      - name: "Brazilian National Inland Waterway Regulations - Side Independent"
        definition: "Navigational aids conform to the Brazilian national inland waterway regulations - side independent."
      - name: "Paraguay-Parana Waterway - Brazilian Complementary Aids"
        definition: "Navigational aids conform to the Brazilian complementary aids on the Paraguay-Parana waterway."
    remarks: "No remarks."

  - title: "Height"
    definition: "The value of the vertical distance to the highest point of the object, measured from a specified vertical datum."
    remarks: "Height must not be used for floating objects."

  - title: "Elevation"
    definition: "The altitude of the ground level of an object, measured from a specified vertical datum."
    remarks: "No remarks."

  - title: "Colour Pattern"
    definition: "A regular repeated design containing more than one colour."
    sub_definitions:
      - name: "Horizontal Stripes"
        definition: "Straight bands or stripes of differing colours oriented horizontally."
      - name: "Vertical Stripes"
        definition: "Straight bands or stripes of differing colours oriented vertically."
      - name: "Diagonal Stripes"
        definition: "Straight bands or stripes of differing colours oriented diagonally (that is, not horizontally or vertically)."
      - name: "Squared"
        definition: "Often referred to as checker plate, where alternate colours are used to create squares similar to a chess or draught board. The pattern may be straight or diagonal."
      - name: "Stripes (Direction Unknown)"
        definition: "Straight bands or stripes of differing colours oriented in an unknown direction."
      - name: "Border Stripe"
        definition: "A band or stripe of colour which is displayed around the outer edge of the object, which may also form a border to an inner pattern or plain colour."
      - name: "Single Colour"
        definition: "One solid colour of uniform coverage."
      - name: "Rectangle"
        definition: "A four-sided shape that is made up of two pairs of parallel lines and that has four right angles, on a different coloured background."
      - name: "Triangle"
        definition: "A shape that is made up of three lines and three angles, on a different coloured background."
    remarks: "No remarks."

  - title: "Colour"
    definition: "The property possessed by an object of producing different sensations on the eye as a result of the way it reflects or emits light."
    sub_definitions:
      - name: "White"
        definition: "The achromatic object colour of greatest lightness characteristically perceived to belong to objects that reflect diffusely nearly all incident energy throughout the visible spectrum."
      - name: "Black"
        definition: "The achromatic color of least lightness characteristically perceived to belong to objects that neither reflect nor transmit light."
      - name: "Red"
        definition: "A color whose hue resembles that of blood or of the ruby or is that of the long-wave extreme of the visible spectrum."
      - name: "Green"
        definition: "Of the color green."
      - name: "Blue"
        definition: "A color whose hue is that of the clear sky or that of the portion of the color spectrum lying between green and violet."
      - name: "Yellow"
        definition: "A color whose hue resembles that of ripe lemons or sunflowers or is that of the portion of the spectrum lying between green and orange."
      - name: "Grey"
        definition: "Of the color grey."
      - name: "Brown"
        definition: "Any of a group of colors between red and yellow in hue, of medium to low lightness, and of moderate to low saturation."
      - name: "Amber"
        definition: "A variable color averaging a dark orange yellow."
      - name: "Violet"
        definition: "Any of a group of colors of reddish-blue hue, low lightness, and medium saturation."
      - name: "Orange"
        definition: "Any of a group of colors that are between red and yellow in hue."
      - name: "Magenta"
        definition: "A deep purplish red."
      - name: "Pink"
        definition: "Any of a group of colors bluish red to red in hue, of medium to high lightness, and of low to moderate saturation."
    remarks: "No remarks."

  - title: "Beacon Shape"
    definition: "Describes the characteristic geometric form of the beacon."
    sub_definitions:
      - name: "Stake, Pole, Perch, Post"
        definition: "An elongated wood or metal pole, driven into the ground or seabed, which serves as a navigational aid or a support for a navigational aid."
      - name: "Withy"
        definition: "A tree without roots stuck or spoiled into the bottom of the sea to serve as a navigational aid."
      - name: "Beacon Tower"
        definition: "A solid structure of the order of 10 metres in height used as a navigational aid."
      - name: "Lattice Beacon"
        definition: "A structure consisting of strips of metal or wood crossed or interlaced to form a structure to serve as an aid to navigation or as a support for an aid to navigation."
      - name: "Pile Beacon"
        definition: "A long heavy timber(s) or section(s) of steel, wood, concrete, etc., forced into the seabed to serve as an aid to navigation or as a support for an aid to navigation."
      - name: "Cairn"
        definition: "A mound of stones, usually conical or pyramidal, raised as a landmark or to designate a point of importance in surveying."
      - name: "Buoyant Beacon"
        definition: "A tall spar-like beacon fitted with a permanently submerged buoyancy chamber, the lower end of the body is secured to seabed sinker either by a flexible joint or by a cable under tension."
    remarks: "No remarks."

  - title: "Date Start"
    definition: "The earliest date on which an object (for example a buoy) will be present."
    remarks: |
      The Date Start should be encoded using 4 digits for the calendar year (YYYY), 2 digits for the month (MM) (for example April = 04) and 2 digits for the day (DD).
      
      When no specific month and/or day is required/known, indication of the month and/or day is omitted, and replaced with dashes (-).
      
      When no specific year is required (that is, the event or date range ends at the same time each year) the following two cases may be considered:
      
      * same day each year: ----MMDD
      * same month each year: ----MM--
      
      This conforms to ISO 8601: 2004. Date Start indicates the earliest date of an event or the start of a date range. It is used to indicate the start of a fixed date range, the start of a periodic date range, or the deployment or implementation of a feature at a specific date in the future.

  - title: "Date End"
    definition: "The latest date on which an object (for example a buoy) will be present."
    remarks: |
      The Date End should be encoded using 4 digits for the calendar year (YYYY), 2 digits for the month (MM) (for example April = 04) and 2 digits for the day (DD).
      
      When no specific month and/or day is required/known, indication of the month and/or day is omitted, and replaced with dashes (-).
      
      When no specific year is required (that is, the event or date range ends at the same time each year) the following two cases may be considered:
      
      * same day each year: ----MMDD
      * same month each year: ----MM--
      
      This conforms to ISO 8601: 2004. Date End indicates the latest date of an event or the end of a date range. It is used to indicate the end of a fixed date range, the end of a periodic date range, or the removal or cancellation of a feature at a specific date in the future.

  - title: "Installation Date"
    definition: "The date when an item was installed."
    remarks: "No remarks."

  - title: "AtoN Number"
    definition: "Identifier from a list of Aids to Navigation publication, such as List of Lights."
    remarks: "No remarks."

  - title: "Interoperability Identifier"
    definition: "A common unique identifier for entities which describe a single real-world feature, and which is used to identify instances of the feature in end-user systems where the feature may be included in multiple data product types."
    remarks: "No remarks."

  - title: "ID Code"
    definition: "Identification code as specified in predefined system. Also called identification number."
    remarks: "No remarks."

  - title: "Scale Minimum"
    definition: "The minimum scale at which the feature may be used for example for ECDIS presentation."
    remarks: "The modulus of the scale is indicated, that is 1:1 250 000 is encoded as 1250000."

  - title: "Source Date"
    definition: "The production date of the source; for example the date of measurement."
    remarks: "No remarks."

  - title: "Source"
    definition: "The publication, document, or reference work from which information comes or is acquired."
    remarks: "May be populated with the corresponding paper chart Notice to Mariners numbers, although other references are permitted."

  - title: "Pictorial Representation"
    definition: "Indicates whether a pictorial representation of the feature is available."
    remarks: "The 'pictorial representation' could be a drawing or a photo. The string encodes the file name of an external graphic file (pixel/vector)."

  - title: "Inspection Frequency"
    definition: "A statement of how frequently an item is inspected."
    remarks: "No remarks."

  - title: "Inspection Requirements"
    definition: "A statement of what requirements are in place for how inspection of an item is carried out."
    remarks: "No remarks."

  - title: "AtoN Maintenance Record"
    definition: "A reference following the Uniform Resource Identifier (URI) principles to a record of maintenance."
    remarks: "No remarks."

  - title: "Display Name"
    definition: "A statement expressing if a feature name is to be displayed in certain system display settings or not."
    remarks: "Where it is allowable to encode multiple instances of feature name for a single feature instance, only one feature name instance can indicate that the name is to be displayed (display name set to True)."

  - title: "Name"
    definition: "The individual name of a feature."
    remarks: "No remarks."

  - title: "Aid Availability Category"
    definition: "A Category denoting the significance of an Aid to Navigation, expressed in terms of the probability that an AtoN or system of AtoN, as defined by the Competent Authority, is performing its specified function at any randomly chosen time."
    sub_definitions:
      - name: "Category 1"
        definition: "An AtoN or system of AtoN that is considered by the Competent Authority to be of vital navigational significance."
      - name: "Category 2"
        definition: "An AtoN or system of AtoN that is considered by the Competent Authority to be of important navigational significance."
      - name: "Category 3"
        definition: "An AtoN or system of AtoN that is considered by the Competent Authority to be of necessary navigational significance."
    remarks: "No remarks."

  - title: "Condition"
    definition: "The various conditions of buildings and other constructions."
    sub_definitions:
      - name: "Under Construction"
        definition: "Being built but not yet capable of function."
      - name: "Ruined"
        definition: "A structure in a decayed or deteriorated condition resulting from neglect or disuse, or a damaged structure in need of repair."
      - name: "Under Reclamation"
        definition: "An area of the sea, a lake or the navigable part of a river that is being reclaimed as land, usually by the dumping of earth and other material."
      - name: "Wingless"
        definition: "A windmill or wind turbine from which the vanes or turbine blades are missing."
      - name: "Planned Construction"
        definition: "Detailed planning has been completed but construction has not been initiated."
    remarks: "The default 'condition' should be considered to be completed, undamaged and working normally."

  - title: "Remote Monitoring System"
    definition: "Classification or name of system used to remotely monitor a feature."
    remarks: "No remarks."

  - title: "Delivery Point"
    definition: "Details of where post can be delivered such as the apartment, name and/or number of a street, building or PO Box."
    remarks: "No remarks."

  - title: "City Name"
    definition: "The name of a town or city."
    remarks: "No remarks."

  - title: "Administrative Division"
    definition: "A generic term for an administrative region within a country at a level below that of the sovereign state."
    remarks: "No remarks."

  - title: "Country Name"
    definition: "The name of a nation."
    remarks: "No remarks."

  - title: "Postal Code"
    definition: "Known in various countries as a postcode, or ZIP code, the postal code is a series of letters and/or digits that identifies each postal delivery area."
    remarks: "No remarks."

  - title: "Category Of Aggregation"
    definition: "Named aggregations between two or more aids to navigation and/or navigationally relevant features."
    sub_definitions:
      - name: "leading line"
        definition: "-"
      - name: "measured distance"
        start: 3
        definition: "-"
      - name: "range system"
        start: 2
        definition: "-"
    remarks: "No remarks."

  - title: "Text"
    definition: "A non-formatted digital text string."
    remarks: |
      Should be used, for example, to hold the information that is for short cautionary or explanatory notes.
      
      Therefore, text populated in text must not exceed 300 characters. Text may be in English, or in a national language.
      
      No formatting of text is possible within text. If formatted text, or text strings exceeding 300 characters, is required, then an alternate concept should be used.

  - title: "Language"
    definition: "The method of human communication, either spoken or written, consisting of the use of words in a structured and conventional way."
    remarks: "The language is encoded by a 3 character code following ISO 639-2/T."

  - title: "Headline"
    definition: "Words set at the head of a passage or page to introduce or categorize."
    remarks: "No remarks."

  - title: "File Reference"
    definition: "The file name of an externally referenced text file."
    remarks: "No remarks."

  - title: "File Locator"
    definition: "The location of a fragment of text or other information in a support file."
    remarks: |
      Application schemas must describe how the associated file is identified. The associated file will commonly be named in a file reference co-attribute of the same complex attribute.
      
      Each DCEG must specify requirements for the format of the associated file and the semantics of file locator.
      
      For example, the value of file locator may be an HTML ID in an HTML file, line number in a text file, or a bookmark in a PDF file.

  - title: "Uncertainty Variable Factor"
    definition: "The factor to be applied to the variable component of an uncertainty equation so as to provide the best estimate of the variable horizontal or vertical accuracy component for positions, depths, heights, vertical distances and vertical clearances."
    remarks: "No remarks."

  - title: "Uncertainty Fixed"
    definition: "The best estimate of the fixed horizontal or vertical accuracy component for positions, depths, heights, vertical distances and vertical clearances."
    remarks: "No remarks."

  - title: "Information in National Language"
    definition: "Textual information in national language characters."
    remarks: |
      Encodes any textual information about an object using a specified national language. The textual information could be, for example, a list, a table or a text.
      
      This should be used, for example, to hold the information that is shown on paper charts by cautionary and explanatory notes.

  - title: "Horizontal Distance Uncertainty"
    definition: "The best estimate of the horizontal accuracy of horizontal clearances and distances."
    remarks: "The error is assumed to be positive and negative. The plus/minus character must not be encoded."

  - title: "Orientation Uncertainty"
    definition: "The best estimate of the accuracy of a bearing."
    remarks: "No remarks."

  - title: "Category of Temporal Variation"
    definition: "An assessment of the likelihood of change over time."
    sub_definitions:
      - name: "Extreme Event"
        definition: "Indication of the possible impact of a significant event (for example hurricane, earthquake, volcanic eruption, landslide, etc), which is considered likely to have changed the seafloor or landscape significantly."
      - name: "Likely to Change and Significant Shoaling Expected"
        definition: "Continuous or frequent change (for example river siltation, sand waves, seasonal storms, icebergs, etc) that is likely to result in new significant shoaling."
      - name: "Likely to Change But Significant Shoaling Not Expected"
        definition: "Continuous or frequent change (for example sand wave shift, seasonal storms, icebergs, etc) that is not likely to result in new significant shoaling."
      - name: "Likely to Change"
        definition: "Continuous or frequent change to non-bathymetric features (for example river siltation, glacier creep/recession, sand dunes, buoys, marine farms, etc)."
      - name: "Unlikely to Change"
        definition: "Significant change to the seafloor is not expected."
      - name: "Unassessed"
        definition: "Not having been assessed."
    remarks: "No remarks."

  - title: "Maximum Display Scale"
    definition: "The value considered by the Data Producer to be the maximum (largest) scale at which the data is to be displayed before it can be considered to be 'grossly overscaled'."
    remarks: "No remarks."

  - title: "Minimum Display Scale"
    definition: "The smallest intended viewing scale for the data."
    remarks: "No remarks."

  - title: "Aton Commissioning"
    definition: "Different stages of the establishment of aids to navigation."
    sub_definitions:
      - name: "Buoy establishment"
        definition: ""
      - name: "Light establishment"
        definition: ""
      - name: "Beacon establishment"
        definition: ""
      - name: "Audible signal establishment"
        definition: ""
      - name: "Fog signal establishment"
        definition: ""
      - name: "AIS transmitter establishment"
        definition: ""
      - name: "V-AIS establishment"
        definition: ""
      - name: "RACON establishment"
        definition: ""
      - name: "DGPS station establishment"
        definition: ""
      - name: "eLORAN station establishment"
        definition: ""
      - name: "DGLONASS station establishment"
        definition: ""
      - name: "e-Chayka station establishment"
        definition: ""
      - name: "EGNOS establishment"
        definition: ""
    remarks: "No remarks."

  - title: "Aton Removal"
    definition: "Different stages of removal or temporary removal of aids to navigation."
    sub_definitions:
      - name: "Buoy removal"
        definition: ""
      - name: "Buoy temporary removal"
        definition: ""
      - name: "Light removal"
        definition: ""
      - name: "Light temporary removal"
        definition: ""
      - name: "Beacon removal"
        definition: ""
      - name: "Beacon temporary removal"
        definition: ""
      - name: "Fog signal removal"
        definition: ""
      - name: "Fog signal temporary removal"
        definition: ""
      - name: "Audible signal removal"
        definition: ""
      - name: "Audible signal temporary removal"
        definition: ""
      - name: "V-AIS removal"
        definition: ""
      - name: "V-AIS temporary removal"
        definition: ""
      - name: "RACON signal removal"
        definition: ""
      - name: "RACON temporary removal"
        definition: ""
      - name: "DGPS removal"
        definition: ""
      - name: "DGPS temporary removal"
        definition: ""
      - name: "EGNOS removal"
        definition: ""
      - name: "EGNOS temporary removal"
        definition: ""
      - name: "LORAN C station removal"
        definition: ""
      - name: "LORAN C station temporary removal"
        definition: ""
      - name: "eLORAN removal"
        definition: ""
      - name: "eLORAN temporary removal"
        definition: ""
      - name: "Chayka station removal"
        definition: ""
      - name: "Chayka station temporary removal"
        definition: ""
      - name: "e-Chayka station removal"
        definition: ""
      - name: "e-Chayka station temporary removal"
        definition: ""
    remarks: "No remarks."

  - title: "Aton Replacement"
    definition: "Different stages of replacing aids to navigation."
    sub_definitions:
      - name: "Buoy change"
        definition: ""
      - name: "Buoy temporary change"
        definition: ""
      - name: "Light change"
        definition: ""
      - name: "Light temporary change"
        definition: ""
      - name: "Sector light change"
        definition: ""
      - name: "Sector light temporary change"
        definition: ""
      - name: "Beacon change"
        definition: ""
      - name: "Beacon temporary change"
        definition: ""
      - name: "Fog signal change"
        definition: ""
      - name: "Fog signal temporary change"
        definition: ""
      - name: "Audible signal change"
        definition: ""
      - name: "Audible signal temporary change"
        definition: ""
      - name: "V-AIS change"
        definition: ""
      - name: "V-AIS temporary change"
        definition: ""
      - name: "RACON signal change"
        definition: ""
      - name: "RACON temporary change"
