  - name: "Isolated Danger Beacon"
    definition: "A beacon is a prominent specially constructed object forming a conspicuous mark as a fixed aid to navigation or for use in hydrographic survey (IHO Dictionary, S-32, 5th Edition, 420). An isolated danger beacon is a beacon erected on an isolated danger of limited extent, which has navigable water all around it. (UKHO NP735, 5th Edition)"
    super_type: "GenericBeacon"
    primitives: "point"
    attributes: []

  - name: "Cardinal Beacon"
    definition: "A cardinal beacon is used in conjunction with the compass to indicate where the mariner may find the best navigable water. It is placed in one of the four quadrants (North, East, South and West), bounded by inter-cardinal bearings from the point marked."
    super_type: "GenericBeacon"
    primitives: "point"
    attributes:
      - name: "Category of Cardinal Mark"
        s57_acronym: "(CATCAM)"
        encoding_value: |
          1 : North Cardinal Mark
          
          2 : East Cardinal Mark
          
          3 : South Cardinal Mark
          
          4 : West Cardinal Mark
        type: "EN"
        multiplicity: "1, 1"

  - name: "Isolated Danger Buoy"
    definition: "A buoy is a floating object moored to the bottom in a particular place, as an aid to navigation or for other specific purposes. (IHO Dictionary, S-32, 5th Edition, 565). A isolated danger buoy is a buoy moored on or above an isolated danger of limited extent, which has navigable water all around it. (UKHO NP735, 5th Edition)"
    super_type: "GenericBuoy"
    primitives: "point"
    attributes: []

  - name: "Cardinal Buoy"
    definition: "A cardinal buoy is used in conjunction with the compass to indicate where the mariner may find the best navigable water. It is placed in one of the four quadrants (North, East, South and West), bounded by inter-cardinal bearings from the point marked."
    super_type: "GenericBuoy"
    primitives: "point"
    attributes:
      - name: "Category of Cardinal Mark"
        s57_acronym: "(CATCAM)"
        encoding_value: |
          1 : North Cardinal Mark
          
          2 : East Cardinal Mark
          
          3 : South Cardinal Mark
          
          4 : West Cardinal Mark
        type: "EN"
        multiplicity: "1, 1"

  - name: "Installation Buoy"
    definition: "A buoy is a floating object moored to the bottom in a particular place, as an aid to navigation or for other specific purposes. (IHO Dictionary, S-32, 5th Edition, 565). An installation buoy is a buoy used for loading tankers with gas or oil. (IHO Chart Specifications, M-4)"
    super_type: "GenericBuoy"
    primitives: "point"
    attributes:
      - name: "Category Of Installation Buoy"
        s57_acronym: ""
        encoding_value: |
          1 : catenary anchor leg mooring (CALM)
          
          2 : catenary anchor leg mooring (CALM)
        type: "EN"
        multiplicity: "1, 1"

  - name: "Mooring Buoy"
    definition: "The equipment or structure used to secure a vessel. (IHO Registry)"
    super_type: "GenericBuoy"
    primitives: "point"
    attributes: []

  - name: "Emergency Wreck Marking Buoy"
    definition: "An emergency wreck marking buoy is a buoy moored on or above a new wreck, designed to provide a prominent (both visual and radio) and easily identifiable temporary (24-72 hours) first response. (IHO Registry)"
    super_type: "GenericBuoy"
    primitives: "point"
    attributes: []

  - name: "Lighthouse"
    definition: "A distinctive structure on or off a coast exhibiting a major light designed to serve as an aid to navigation."
    super_type: "Landmark"
    primitives: "point, surface"
    attributes: []

